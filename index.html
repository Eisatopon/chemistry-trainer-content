<style>
  :root {
    --bg:      #1a1000;
    --surface: #2a1a00;
    --card:    #332000;
    --border:  #6b4400;
    --accent1: #c8820a;
    --green:   #3ab26e;
    --red:     #ef4444;
    --amber:   #f59e0b;
    --gold:    #fbbf24;
    --text:    #fff8e8;
    --muted:   #b8924a;
    --mono:    'Space Mono', monospace;
    --sans:    'Sora', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(200,130,10,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(200,130,10,.06) 1px,transparent 1px);
    background-size: 40px 40px;
  }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb1 { width: 500px; height: 500px; background: rgba(200,130,10,.15); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(251,191,36,.08); bottom: -80px; left: -80px; }
  #app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }
  header { display: flex; align-items: center; gap: 16px; padding: 20px 0 32px; }
  .logo-box {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #c8820a, #fbbf24);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 11px; color: #1a1000;
    box-shadow: 0 0 24px rgba(200,130,10,.5);
  }
  .header-text h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-text p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  #chapterSelect { display: flex; flex-direction: column; gap: 20px; }
  .chapter-group h2 { font-size: 13px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 10px; }
  .ch-btn { padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 14px; cursor: pointer; text-align: left; transition: all .2s; }
  .ch-btn:hover { border-color: var(--accent1); background: rgba(200,130,10,.1); }
  .ch-btn .ch-title { font-weight: 600; font-size: 13px; }
  .ch-btn .ch-sub { font-size: 11px; color: var(--gold); margin-top: 2px; }
  .ch-btn .ch-count { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .ch-btn.all-btn { background: linear-gradient(135deg,rgba(200,130,10,.2),rgba(251,191,36,.1)); border-color: var(--accent1); font-weight: 700; color: var(--gold); }
  #quizArea { display: none; }
  .controls-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .ctrl-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all .2s; }
  .ctrl-btn:hover { border-color: var(--accent1); }
  .ctrl-btn.active { background: rgba(200,130,10,.2); border-color: var(--accent1); color: var(--gold); }
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; }
  .progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .progress-label { font-size: 13px; color: var(--muted); }
  .progress-counter { font-family: var(--mono); font-size: 13px; color: var(--gold); }
  .progress-bar-bg { height: 6px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,var(--accent1),var(--gold)); transition: width .4s cubic-bezier(.4,0,.2,1); }
  .progress-stats { display: flex; gap: 16px; margin-top: 12px; }
  .stat { font-size: 12px; }
  .stat span { font-family: var(--mono); font-weight: 700; }
  .stat.correct span { color: var(--green); }
  .stat.wrong span { color: var(--red); }
  .stat.time span { color: var(--amber); }
  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px; animation: slideIn .35s cubic-bezier(.4,0,.2,1); }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .q-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .badge { font-size: 11px; font-family: var(--mono); padding: 3px 9px; border-radius: 99px; border: 1px solid; letter-spacing: .5px; text-transform: uppercase; }
  .badge-easy   { color: var(--green); border-color: rgba(58,178,110,.3);  background: rgba(58,178,110,.08); }
  .badge-medium { color: var(--amber); border-color: rgba(245,158,11,.3);  background: rgba(245,158,11,.08); }
  .badge-hard   { color: var(--red);   border-color: rgba(239,68,68,.3);   background: rgba(239,68,68,.08); }
  .badge-type   { color: var(--muted); border-color: rgba(184,146,74,.2);  background: transparent; }
  .badge-pts    { color: var(--gold);  border-color: rgba(251,191,36,.3);  background: rgba(251,191,36,.06); }
  .q-number { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .q-text   { font-size: 18px; font-weight: 600; line-height: 1.5; color: var(--text); margin-bottom: 24px; }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text); font-family: var(--sans); font-size: 15px; cursor: pointer; text-align: left; transition: all .18s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent1); background: rgba(200,130,10,.08); }
  .option-letter { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.06); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 700; flex-shrink: 0; transition: all .18s; }
  .option-btn.correct   { border-color: var(--green); background: rgba(58,178,110,.08); }
  .option-btn.correct .option-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option-btn.wrong     { border-color: var(--red); background: rgba(239,68,68,.08); }
  .option-btn.wrong .option-letter   { background: var(--red); border-color: var(--red); color: #fff; }
  .explanation { margin-top: 18px; padding: 16px 18px; background: rgba(255,255,255,.04); border-radius: 12px; border-left: 3px solid var(--gold); font-size: 14px; line-height: 1.6; color: var(--muted); animation: fadeIn .3s ease; }
  .explanation strong { color: var(--text); }
  .q-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; flex-wrap: wrap; }
  .btn { padding: 10px 22px; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .18s; }
  .btn-primary { background: linear-gradient(135deg,#c8820a,#fbbf24); color: #1a1000; box-shadow: 0 4px 16px rgba(200,130,10,.4); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent1); }
  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 36px 28px; text-align: center; animation: slideIn .35s cubic-bezier(.4,0,.2,1); }
  .results-score { font-family: var(--mono); font-size: 64px; font-weight: 700; background: linear-gradient(135deg,#fbbf24,#f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 16px 0; }
  .results-label { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
  .results-grade { display: inline-block; padding: 6px 20px; border-radius: 99px; font-size: 18px; font-weight: 700; margin-bottom: 28px; }
  .grade-A { background: rgba(58,178,110,.15); color: var(--green); border: 1px solid rgba(58,178,110,.3); }
  .grade-B { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .grade-C { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
  .results-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 24px 0; }
  .res-stat { padding: 16px 12px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1px solid var(--border); }
  .res-stat-val { font-family: var(--mono); font-size: 28px; font-weight: 700; }
  .res-stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .res-stat.c .res-stat-val { color: var(--green); }
  .res-stat.w .res-stat-val { color: var(--red); }
  .res-stat.t .res-stat-val { color: var(--amber); }
  .back-btn { margin-top: 16px; padding: 12px 28px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: var(--sans); font-size: 14px; cursor: pointer; transition: all .18s; }
  .back-btn:hover { color: var(--text); border-color: var(--accent1); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width:520px) { .results-grid{grid-template-columns:repeat(2,1fr)} .q-text{font-size:16px} .chapter-grid{grid-template-columns:1fr 1fr} }
</style>
</head>

<div class="bg-grid"></div>

<div id="app">

        <div class="stat time">⏱ <span id="statTime">0:00</span></div>
      </div>
    </div>
    <div id="questionArea"></div>
  </div>
</div>

κανένας αριθμός οξείδωσης δεν μεταβάλλεται.", "common_mistake": "Θεωρείται ότι κάθε αντίδραση που περιέχει μέταλλο είναι οξειδοαναγωγική.", "image_url": null, "source": "Σχολικό βιβλίο, §1.1 — κλασικό θέμα Πανελλαδικών"}, {"id": "CH1_1_006", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["H2", "οξειδωτικό", "αναγωγικό", "αναγνώριση"], "learning_objective": "Αναγνώριση ρόλου H2 ως οξειδωτικού ή αναγωγικού", "question": "Το $H_2$ δρα ως οξειδωτικό σώμα στην αντίδραση:", "options": [{"id": "A", "text": "$CH_3CHO + H_2 \\rightarrow CH_3CH_2OH$"}, {"id": "B", "text": "$2Li + H_2 \\rightarrow 2LiH$"}, {"id": "C", "text": "$CH_3CN + 2H_2 \\rightarrow CH_3CH_2NH_2$"}, {"id": "D", "text": "$H_2 + I_2 \\rightarrow 2HI$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Στο $2Li + H_2 \\rightarrow 2LiH$: το H μειώνει τον αριθμό οξείδωσης από 0 σε $-1$ → ανάγεται → $H_2$ είναι οξειδωτικό. Στις άλλες αντιδράσεις ο H αυξάνεται από 0 σε $+1$ → $H_2$ είναι αναγωγικό.", "common_mistake": "Θεωρείται ότι το $H_2$ είναι πάντα αναγωγικό — χωρίς να ελέγχεται η κατεύθυνση μεταβολής του αριθμού οξείδωσης.", "image_url": null, "source": "Σχολικό βιβλίο, §1.1 — Θέμα Α1 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_1_007", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["ορισμός", "οξείδωση", "αριθμός-οξείδωσης"], "learning_objective": "Κατανόηση ορισμού οξείδωσης και αναγωγής", "question": "Κατά την οξείδωση ενός ατόμου, ο αριθμός οξείδωσής του αυξάνεται και αποβάλλει ηλεκτρόνια.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Οξείδωση = αύξηση αριθμού οξείδωσης = αποβολή ηλεκτρονίων. Αναγωγή = μείωση αριθμού οξείδωσης = πρόσληψη ηλεκτρονίων.", "common_mistake": "Συγχέεται η κατεύθυνση: θεωρείται ότι οξείδωση = πρόσληψη ηλεκτρονίων.", "image_url": null, "source": "Σχολικό βιβλίο, §1.1"}, {"id": "CH1_1_008", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["υπεροξείδια", "H2O2", "αριθμός-ο ctive": "Γνώση προϊόντος αναγωγής K2Cr2O7 σε όξινο περιβάλλον", "question": "Το $K_2Cr_2O_7$ σε όξινο περιβάλλον ανάγεται. Η μεταβολή αριθμού οξείδωσης του Cr και η αλλαγή χρώματος είναι:", "options": [{"id": "A", "text": "$+6 \\rightarrow +3$, πορτοκαλί → πράσινο"}, {"id": "B", "text": "$+6 \\rightarrow +2$, πορτοκαλί → μπλε"}, {"id": "C", "text": "$+7 \\rightarrow +3$, ιώδες → πράσινο"}, {"id": "D", "text": "$+6 \\rightarrow +4$, πορτοκαλί → καστανό"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Στο $K_2Cr_2O_7$: Cr = $+6$ (πορτοκαλί). Στο $Cr^{3+}$: Cr = $+3$ (πράσινο). Κερδίζει 3 ηλεκτρόνια. Η αλλαγή χρώματος πορτοκαλί → πράσινο είναι χαρακτηριστική.", "common_mistake": "Συγχέεται ο αρχικός αριθμός οξείδωσης με $+7$ (που ανήκει στο $KMnO_4$).", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — εμφανίζεται στο 8ο επαναληπτικό διαγώνισμα"}, {"id": "CH1_2_004", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["KMnO4", "K2Cr2O7", "οξειδωτικά", "αναγνώριση"], "learning_objective": "Αναγνώριση κυριότερων οξειδωτικών σωμάτων", "question": "Τόσο το $KMnO_4$ όσο και το $K_2Cr_2O_7$ είναι ισχυρά οξειδωτικά σώματα που δρουν κυρίως σε όξινο περιβάλλον.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Και τα δύο είναι ισχυρά οξειδωτικά. Το $KMnO_4$ δρα και σε ουδέτερο/αλκαλικό (δίνει $MnO_2$), αλλά η ισχυρότερη οξειδωτική του δράση εκδηλώνεται σε όξινο περιβάλλον.", "common_mistake": "Θεωρείται ότι το $KMnO_4$ δρα ΜΟΝΟ σε όξινο — ενώ δρα και σε ουδέτερο/αλκαλικό με διαφορετικό προϊόν.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2"}, {"id": "CH1_2_005", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["H2S", "αναγωγικό", "KMnO4", "αριθμός-οξείδωσης"], "learning_objective": "Αναγνώριση ρόλου H2S ως αναγωγικού και υπολογισμός μεταβολής αριθμού οξείδωσης", "question": "Στην αντίδραση $5H_2S + 2KMnO_4 + 3H_2SO_4 \\rightarrow 5S + 2MnSO_4 + K_2SO_4 + 8H_2O$, η μεταβολή του αριθμού οξείδωσης του S (του $H_2S$) είναι:", "options": [{"id": "A", "text": "από $-2$ σε $0$, χάνει 2 ηλεκτρόνια"}, {"id": "B", "text": "από $0$ σε $+2$, χάνει 2 ηλεκτρόνια"}, {"id": "C", "text": "από $-2$ σε $+4$, χάνει 6 ηλεκτρόνια"}, {"id": "D", "text": "από $+4$ σε $0$, κερδίζει 4 ηλεκτρόνια"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Στο $H_2S$: S = $-2$. Στο $S$ (στοιχειακό): S = $0$. Μεταβολή $-2 \\rightarrow 0$: οξειδώνεται, χάνει 2 ηλεκτρόνια. Άρα το $H_2S$ είναι το αναγωγικό σώμα.", "common_mistake": "Συγχέεται ο S του $H_2S$ με τον S του $H_2SO_4$ που δεν μεταβάλλεται.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — από Β1β 7ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Zn", "H2SO4-πυκνό", "SO2", "αναγωγικό"], "learning_objective": "Αναγνώριση οξειδωτικού και αναγωγικού σε αντίδραση μετάλλου με πυκνό H2SO4", "question": "Στην αντίδραση $Zn + 2H_2SO_4(\\text{πυκνό}) \\rightarrow ZnSO_4 + SO_2 + 2H_2O$, ποιο στοιχείο ανάγεται και σε τι;", "options": [{"id": "A", "text": "Το Zn ανάγεται σε $Zn^{2+}$"}, {"id": "B", "text": "Το S ανάγεται από $+6$ σε $+4$"}, {"id": "C", "text": "Το H ανάγεται από $+1$ σε $0$"}, {"id": "D", "text": "Το O ανάγεται από $-2$ σε $0$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Το Zn οξειδώνεται ($0 \\rightarrow +2$). Το S του $H_2SO_4$ ανάγεται: $+6$ (στο $H_2SO_4$) $\\rightarrow +4$ (στο $SO_2$). Το H και το O δεν μεταβάλλουν αριθμό οξείδωσης.", "common_mistake": "Θεωρείται ότι το H ανάγεται (όπως στην αντίδραση με αραιό $H_2SO_4$) — αλλά εδώ το πυκνό $H_2SO_4$ δρα ως οξειδωτικό μέσω του S.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — από Β1α 7ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_007", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["HNO3", "αραιό", "πυκνό", "NO", "NO2"], "learning_objective": "Γνώση προϊόντος αναγωγής HNO3 σε αραιό vs πυκνό", "question": "Κατά την αντίδραση μετάλλου με $HNO_3$, ποιο αέριο παράγεται από το αραιό $HNO_3$ και ποιο από το πυκνό;", "options": [{"id": "A", "text": "Αραιό: $NO_2$ — Πυκνό: $NO$"}, {"id": "B", "text": "Αραιό: $NO$ — Πυκνό: $NO_2$"}, {"id": "C", "text": "Και τα δύο δίνουν $NO$"}, {"id": "D", "text": "Και τα δύο δίνουν $NO_2$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Αραιό $HNO_3$: N $+5 \\rightarrow +2$ → $NO$ (άχρωμο αέριο). Πυκνό $HNO_3$: N $+5 \\rightarrow +4$ → $NO_2$ (καστανέρυθρο αέριο). Το περιβάλλον (αραιό/πυκνό) καθορίζει το προϊόν αναγωγής του N.", "common_mistake": "Αντιστρέφεται: θεωρείται ότι το πυκνό δίνει $NO$ και το αραιό $NO_2$.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2"}, {"id": "CH1_2_008", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["αναγωγικά", "H2", "CO", "H2S", "SO2"], "learning_objective": "Αναγνώριση κυριότερων αναγωγικών σωμάτων", "question": "Τα $H_2$, $CO$, $H_2S$ και $SO_2$ ανήκουν στα κυριότερα αναγωγικά σώματα.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "$H_2$: H $0 \\rightarrow +1$. $CO$: C $+2 \\rightarrow +4$. $H_2S$: S $-2 \\rightarrow 0$. $SO_2$: S $+4 \\rightarrow +6$. Όλα οξειδώνονται — άρα είναι αναγωγικά.", "common_mistake": "Το $SO_2$ συγχέεται με οξειδωτικό — αλλά στις περισσότερες αντιδράσεις δρα ως αναγωγικό.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2"}, {"id": "CH1_2_009", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["K2Cr2O7", "HCl", "Cl2", "αναγωγικό"], "learning_objective": "Αναγνώριση αναγωγικού σώματος σε αντίδραση K2Cr2O7 με HCl", "question": "Στην αντίδραση $K_2Cr_2O_7 + 14HCl \\rightarrow 2CrCl_3 + 3Cl_2 + 2KCl + 7H_2O$, ποιο είναι το αναγωγικό σώμα και ποια η μεταβολή του αριθμού οξείδωσής του;", "options": [{"id": "A", "text": "Το $K_2Cr_2O_7$ — Cr: $+6 \\rightarrow +3$"}, {"id": "B", "text": "Το $HCl$ — Cl: $-1 \\rightarrow 0$"}, {"id": "C", "text": "Το $HCl$ — H: $+1 \\rightarrow 0$"}, {"id": "D", "text": "Το $K_2Cr_2O_7$ — Cr: $+6 \\rightarrow +2$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Το $K_2Cr_2O_7$ είναι το οξειδωτικό (Cr: $+6 \\rightarrow +3$, ανάγεται). Το $HCl$ είναι το αναγωγικό: Cl $-1 \\rightarrow 0$ (στο $Cl_2$), οξειδώνεται, χάνει 1 ηλεκτρόνιο. Το H του $HCl$ δεν μεταβάλλεται (παραμένει $+1$ στο $H_2O$).", "common_mistake": "Θεωρείται ότι το $K_2Cr_2O_7$ είναι αναγωγικό — αλλά ανάγεται, άρα είναι οξειδωτικό.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — από Β2β 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_010", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["οξείδωση-αλκοολών", "KMnO4", "K2Cr2O7", "Fehling", "Cu"], "learning_objective": "Γνώση αντιδραστηρίων οξείδωσης αλκοολών", "question": "Για την οξείδωση της αιθανόλης ($CH_3CH_2OH$) ΔΕΝ χρησιμοποιούμε:", "options": [{"id": "A", "text": "Όξινο διάλυμα $KMnO_4$"}, {"id": "B", "text": "Θέρμανση παρουσία $Cu$"}, {"id": "C", "text": "Όξινο διάλυμα $K_2Cr_2O_7$"}, {"id": "D", "text": "Αντιδραστήριο Fehling"}], "correct_answer": {"type": "option", "value": "D"}, "explanation": "Σύμφωνα με το σχολικό βιβλίο, το αντιδραστήριο Fehling οξειδώνει μόνο αλδεΰδες, ΟΧΙ αλκοόλες. Τα $KMnO_4$ (όξινο), $K_2Cr_2O_7$ (όξινο) και $Cu$/θέρμανση οξειδώνουν αλκοόλες.", "common_mistake": "Θεωρείται ότι το Fehling οξειδώνει κάθε οργανική ένωση — αλλά είναι εκλεκτικό αντιδραστήριο για αλδεΰδες.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Α1 7ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_011", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["SO2", "αμφοτερισμός", "οξειδωτικό", "αναγωγικό"], "learning_objective": "Κατανόηση αμφοτερικού χαρακτήρα SO2 ως οξειδωτικού ή αναγωγικού", "question": "Στην αντίδραση $2H_2S + SO_2 \\rightarrow 3S + 2H_2O$, ο $SO_2$:", "options": [{"id": "A", "text": "Δρα ως αναγωγικό — S: $+4 \\rightarrow +6$"}, {"id": "B", "text": "Δρα ως οξειδωτικό — S: $+4 \\rightarrow 0$"}, {"id": "C", "text": "Δεν μετέχει σε οξειδοαναγωγή"}, {"id": "D", "text": "Δρα και ως οξειδωτικό και ως αναγωγικό"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Στο $SO_2$: S = $+4$. Στο $S$ (στοιχειακό): S = $0$. Μεταβολή $+4 \\rightarrow 0$: ανάγεται. Άρα ο $SO_2$ είναι οξειδωτικό. Το $H_2S$ οξειδώνεται ($-2 \\rightarrow 0$) — είναι το αναγωγικό.", "common_mistake": "Επειδή ο $SO_2$ συνήθως δρα ως αναγωγικό, επιλέγεται λανθασμένα αυτός ο ρόλος χωρίς να ελέγχονται οι αριθμοί οξείδωσης.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2"}, {"id": "CH1_2_012", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["CO", "αναγωγικό", "Fe2O3", "μεταλλουργία"], "learning_objective": "Αναγνώριση CO ως αναγωγικού στη μεταλλουργία", "question": "Στην αντίδραση $Fe_2O_3 + 3CO \\rightarrow 2Fe + 3CO_2$, το $CO$ δρα ως αναγωγικό σώμα.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Στο $CO$: C = $+2$. Στο $CO_2$: C = $+4$. Ο C οξειδώνεται ($+2 \\rightarrow +4$) — άρα το $CO$ είναι αναγωγικό. Ταυτόχρονα το Fe ανάγεται: $+3$ (στο $Fe_2O_3$) $\\rightarrow 0$ ($Fe$).", "common_mistake": "Θεωρείται ότι το $CO$ είναι οξειδωτικό λόγω της παρουσίας οξυγόνου στον τύπο του.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2"}, {"id": "CH1_2_013", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["αντιδράσεις-προσθήκης", "αλκένια", "αναγωγικό", "H2", "Br2", "HBr"], "learning_objective": "Αναγνώριση αντίδρασης στην οποία το αλκένιο δρα αποκλειστικά ως αναγωγικό", "question": "Στις παρακάτω αντιδράσεις προσθήκης στο προπένιο, σε ποια το προπένιο δρα ΑΠΟΚΛΕΙΣΤΙΚΑ ως αναγωγικό σώμα;", "options": [{"id": "A", "text": "$CH_3CH=CH_2 + H_2 \\rightarrow CH_3CH_2CH_3$"}, {"id": "B", "text": "$CH_3CH=CH_2 + Br_2 \\rightarrow CH_3CHBrCH_2Br$"}, {"id": "C", "text": "$CH_3CH=CH_2 + HBr \\rightarrow CH_3CHBrCH_3$"}, {"id": "D", "text": "Σε καμία — το αλκένιο δεν μπορεί να είναι αναγωγικό"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Στην αντίδραση με $Br_2$ (επιλογή Β): το Br $0 \\rightarrow -1$ (ανάγεται) — το $Br_2$ είναι οξειδωτικό. Ο C του διπλού δεσμού αυξάνει τον αριθμό οξείδωσης → οξειδώνεται → το προπένιο δρα ως αναγωγικό. Στην αντίδραση με $H_2$ (επιλογή Α): ο C μειώνει τον αριθμό οξείδωσης → ανάγεται → το προπένιο δρα ως οξειδωτικό. Στην αντίδραση με $HBr$ (επιλογή Γ): ο C του διπλού δεσμού που δέχεται το Br αυξάνει τον αριθμό οξείδωσης, ενώ ο άλλος C μειώνει — δεν υπάρχει καθαρός ρόλος αναγωγικού για το αλκένιο.", "common_mistake": "Θεωρείται ότι σε κάθε αντίδραση προσθήκης το αλκένιο είναι αναγωγικό — αλλά εξαρτάται από τη μεταβολή του αριθμού οξείδωσης του C.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Β1α 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_014", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["KMnO4", "NaCl", "H2SO4", "Cl2", "ισοστάθμιση"], "learning_objective": "Αναγνώριση οξειδωτικού και αναγωγικού σε σύνθετη αντίδραση με KMnO4", "question": "Στην αντίδραση $2KMnO_4 + 10NaCl + 8H_2SO_4 \\rightarrow 2MnSO_4 + 5Cl_2 + K_2SO_4 + 5Na_2SO_4 + 8H_2O$, πόσα ηλεκτρόνια χάνει κάθε άτομο Cl;", "options": [{"id": "A", "text": "5 ηλεκτρόνια"}, {"id": "B", "text": "2 ηλεκτρόνια"}, {"id": "C", "text": "1 ηλεκτρόνιο"}, {"id": "D", "text": "3 ηλεκτρόνια"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Το Cl στο $NaCl$: $-1$. Στο $Cl_2$: $0$. Μεταβολή $-1 \\rightarrow 0$: κάθε άτομο Cl χάνει 1 ηλεκτρόνιο. (Το Mn στο $KMnO_4$ κερδίζει 5 ηλεκτρόνια: $+7 \\rightarrow +2$.)", "common_mistake": "Συγχέεται η μεταβολή του Cl ($-1 \\rightarrow 0$, 1e⁻) με αυτή του Mn ($+7 \\rightarrow +2$, 5e⁻).", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Β2γ 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_015", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["Sn", "HNO3", "αραιό", "NH4+", "ισοστάθμιση"], "learning_objective": "Αναγνώριση προϊόντος αναγωγής πολύ αραιού HNO3 με ενεργό μέταλλο", "question": "Στην αντίδραση $4Sn + 10HNO_3(\\text{πολύ αραιό}) \\rightarrow 4Sn(NO_3)_2 + NH_4NO_3 + 3H_2O$, τι συμβαίνει με τον αριθμό οξείδωσης του N του $HNO_3$ που αντέδρασε οξειδοαναγωγικά;", "options": [{"id": "A", "text": "N: $+5 \\rightarrow +4$ ($NO_2$)"}, {"id": "B", "text": "N: $+5 \\rightarrow +2$ ($NO$)"}, {"id": "C", "text": "N: $+5 \\rightarrow -3$ ($NH_4^+$)"}, {"id": "D", "text": "Ο N δεν μεταβάλλει αριθμό οξείδωσης"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Σε πολύ αραιό $HNO_3$ με ενεργά μέταλλα: το N ($+5$) ανάγεται σε $-3$ ($NH_4^+$) — μέγιστη αναγωγή. Το $NH_4NO_3$ περιέχει N σε δύο καταστάσεις: $NH_4^+$ (N = $-3$, αυτό που αναγάχθηκε) και $NO_3^-$ (N = $+5$, δεν μεταβλήθηκε). Σε λιγότερο αραιό: N $\\rightarrow +2$ ($NO$). Σε πυκνό: N $\\rightarrow +4$ ($NO_2$).", "common_mistake": "Θεωρείται ότι το αραιό $HNO_3$ δίνει πάντα $NO$ — αλλά με πολύ αραιό και ενεργά μέταλλα δίνει $NH_4^+$.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Β2δ 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_016", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["μεταθετική", "οξειδοαναγωγή", "διάκριση"], "learning_objective": "Διάκριση μεταθετικής από οξειδοαναγωγική αντίδραση", "question": "Η αντίδραση $H_2SO_4 + 2KOH \\rightarrow K_2SO_4 + 2H_2O$ είναι οξειδοαναγωγική.", "correct_answer": {"type": "boolean", "value": false}, "explanation": "Έλεγχος: H: $+1 \\rightarrow +1$, S: $+6 \\rightarrow +6$, O: $-2 \\rightarrow -2$, K: $+1 \\rightarrow +1$. Κανένας αριθμός οξείδωσης δεν μεταβάλλεται → μεταθετική αντίδραση εξουδετέρωσης, ΟΧΙ οξειδοαναγωγή.", "common_mistake": "Θεωρείται οξειδοαναγωγή επειδή εμπλέκεται $H_2SO_4$ — αλλά το κριτήριο είναι η μεταβολή αριθμών οξείδωσης.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Α5 7ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_017", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["H2O2", "KMnO4", "οξειδωτικό-αναγωγικό"], "learning_objective": "Αναγνώριση ρόλου H2O2 ως αναγωγικού παρουσία KMnO4", "question": "Στην αντίδραση $5H_2O_2 + 2KMnO_4 + 3H_2SO_4 \\rightarrow 5O_2 + 2MnSO_4 + K_2SO_4 + 8H_2O$, το $H_2O_2$:", "options": [{"id": "A", "text": "Δρα ως οξειδωτικό — O: $-1 \\rightarrow -2$"}, {"id": "B", "text": "Δρα ως αναγωγικό — O: $-1 \\rightarrow 0$"}, {"id": "C", "text": "Δεν μετέχει σε οξειδοαναγωγή"}, {"id": "D", "text": "Δρα και ως οξειδωτικό και ως αναγωγικό"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Στο $H_2O_2$: O = $-1$. Στο $O_2$: O = $0$. Μεταβολή $-1 \\rightarrow 0$: οξειδώνεται → το $H_2O_2$ είναι αναγωγικό. Εδώ το $KMnO_4$ είναι το οξειδωτικό. Προσοχή: το $H_2O_2$ μπορεί να δράσει και ως οξειδωτικό σε άλλες αντιδράσεις — εξαρτάται από το άλλο αντιδρών.", "common_mistake": "Το $H_2O_2$ θεωρείται πάντα οξειδωτικό — αλλά παρουσία ισχυρότερου οξειδωτικού ($KMnO_4$) δρα ως αναγωγικό.", "image_url": null, "source": "Σχολικό βιβλίο, §1.2 — Θέμα Β2α 8ου επαναληπτικού διαγωνίσματος"}, {"id": "CH1_2_018", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["αριθμός-οξείδωσης", "οργανική", "C", "οξείδωση-αναγωγή"], "learning_objective": "Εφαρμογή έννοιας οξείδωσης/αναγωγής στην οργανική χημεία", "question": "Στην οργανική χημεία, ποια από τις παρακάτω μετατροπές αντιστοιχεί σε ΑΝΑΓΩΓΗ του άνθρακα;", "options": [{"id": "A", "text": "$CH_3OH \\rightarrow HCHO$ (μεθανόλη → μεθανάλη)"}, {"id": "B", "text": "$HCHO \\rightarrow HCOOH$ (μεθανάλη → μυρμηκικό οξύ)"}, {"id": "C", "text": "$HCOOH \\rightarrow CO_2$ (μυρμηκικό οξύ → $CO_2$)"}, {"id": "D", "text": "$CO_2 \\rightarrow HCOOH$ ($CO_2$ → μυρμηκικό οξύ)"}], "correct_answer": {"type": "option", "value": "D"}, "explanation": "Αριθμοί οξείδωσης C: $CH_3OH$: $-2$. $HCHO$: $0$. $HCOOH$: $+2$. $CO_2$: $+4$. Α, Β, Γ: αύξηση → οξείδωση. Δ: $CO_2 \\rightarrow HCOOH$: $+4 \\rightarrow +2$ → μείωση → αναγωγή.", "common_mistake": "Δεν υπολογίζεται ο αριθμός οξείδωσης του C σε κάθε ένωση — const CH2 = [{"id": "CH2_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ενδόθερμη", "εξώθερμη", "ορισμός", "πρόσημο-ΔΗ"], "learning_objective": "Αναγνώριση ενδόθερμου φαινομένου", "question": "Ποιο από τα παρακάτω είναι ενδόθερμο φαινόμενο;", "options": [{"id": "A", "text": "Καύση άνθρακα"}, {"id": "B", "text": "Τήξη πάγου"}, {"id": "C", "text": "Συμπύκνωση υδρατμών"}, {"id": "D", "text": "Εξουδετέρωση ισχυρού οξέος με ισχυρή βάση"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Ενδόθερμο φαινόμενο: το σύστημα απορροφά θερμότητα από το περιβάλλον ($\\Delta H > 0$). Η τήξη πάγου απορροφά θερμότητα. Καύση, συμπύκνωση και εξουδετέρωση είναι εξώθερμα ($\\Delta H < 0$).", "common_mistake": "Η εξουδετέρωση θεωρείται ενδόθερμη — αλλά είναι πάντα εξώθερμη.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Α1 2ου διαγωνίσματος"}, {"id": "CH2_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["πρότυπη-ενθαλπία", "σχηματισμός", "ορισμός"], "learning_objective": "Κατανόηση ορισμού πρότυπης ενθαλπίας σχηματισμού", "question": "Η πρότυπη ενθαλπία σχηματισμού ($\\Delta H_f^\\circ$) μιας ένωσης ορίζεται ως η ενθαλπία της αντίδρασης κατά την οποία:", "options": [{"id": "A", "text": "1 mol ένωσης καίγεται πλήρως σε $O_2$ σε πρότυπες συνθήκες"}, {"id": "B", "text": "1 mol ένωσης σχηματίζεται από τα στοιχεία της στην πιο σταθερή μορφή τους, σε πρότυπες συνθήκες"}, {"id": "C", "text": "1 mol ένωσης διαλύεται σε νερό σε πρότυπες συνθήκες"}, {"id": "D", "text": "Οποιαδήποτε ποσότητα ένωσης σχηματίζεται από τα στοιχεία της"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Η $\\Delta H_f^\\circ$ αναφέρεται αυστηρά σε: (α) 1 mol προϊόντος, (β) σχηματισμό από στοιχεία στην πιο σταθερή φυσική τους μορφή, (γ) πρότυπες συνθήκες (298 K, 1 atm).", "common_mistake": "Συγχέεται με ενθαλπία καύσης ή δεν αναφέρεται η ποσότητα '1 mol'.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1"}, {"id": "CH2_003", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["πρότυπη-ενθαλπία", "στοιχεία", "μηδέν", "γραφίτης-διαμάντι"], "learning_objective": "Γνώση ότι ΔHf°=0 μόνο για την πιο σταθερή μορφή στοιχείου", "question": "Η πρότυπη ενθαλπία σχηματισμού του διαμαντιού είναι μηδέν, όπως και του γραφίτη.", "correct_answer": {"type": "boolean", "value": false}, "explanation": "Η $\\Delta H_f^\\circ = 0$ ισχύει ΜΟΝΟ για την πιο σταθερή μορφή κάθε στοιχείου. Για τον άνθρακα αυτή είναι ο γραφίτης ($\\Delta H_f^\\circ = 0$). Το διαμάντι είναι λιγότερο σταθερό: $\\Delta H_f^\\circ(\\text{διαμάντι}) = +1{,}9$ kJ/mol.", "common_mistake": "Θεωρείται ότι κάθε μορφή στοιχείου έχει $\\Delta H_f^\\circ = 0$.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Β2α 4ου διαγωνίσματος"}, {"id": "CH2_004", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["θερμοχημική-εξίσωση", "ερμηνεία", "H2O", "286kJ"], "learning_objective": "Ερμηνεία θερμοχημικής εξίσωσης", "question": "Δίνεται: $H_2(g) + \\frac{1}{2}O_2(g) \\rightarrow H_2O(l)$, $\\Delta H^\\circ = -286$ kJ. Ποιο από τα παρακάτω συμπεράσματα είναι ΣΩΣΤΟ;", "options": [{"id": "A", "text": "Κατά την καύση οποιασδήποτε ποσότητας $H_2$ εκλύονται 286 kJ"}, {"id": "B", "text": "Κατά τον σχηματισμό 1 mol υγρού νερού απορροφώνται 286 kJ"}, {"id": "C", "text": "Η πρότυπη ενθαλπία καύσης του $H_2$ είναι $-286$ kJ/mol"}, {"id": "D", "text": "Κατά την καύση 1 mol $H_2$ προς $H_2O(g)$ εκλύονται 286 kJ"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Α: Λάθος — 286 kJ εκλύονται μόνο για 1 mol $H_2$. Β: Λάθος — εκλύονται (εξώθερμη, $\\Delta H < 0$), δεν απορροφώνται. Γ: Σωστό — αυτός είναι ο ορισμός της ενθαλπίας καύσης. Δ: Λάθος — η εξίσωση αφορά $H_2O(l)$, όχι $H_2O(g)$.", "common_mistake": "Στην επιλογή Β: συγχέεται το αρνητικό πρόσημο — εξώθερμη σημαίνει έκλυση, όχι απορρόφηση.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Α1 4ου διαγωνίσματος"}, {"id": "CH2_005", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["φυσική-κατάσταση", "ενθαλπία", "H2O-υγρό-αέριο"], "learning_objective": "Κατανόηση επίδρασης φυσικής κατάστασης στην ενθαλπία αντίδρασης", "question": "Δίνονται: $H_2(g) + \\frac{1}{2}O_2(g) \\rightarrow H_2O(l)$, $\\Delta H_1 = -286$ kJ και $H_2(g) + \\frac{1}{2}O_2(g) \\rightarrow H_2O(g)$, $\\Delta H_2 = -242$ kJ. Τι εκφράζει η διαφορά $|\\Delta H_1| - |\\Delta H_2| = 44$ kJ;", "options": [{"id": "A", "text": "Την ενθαλπία ιοντισμού του νερού"}, {"id": "B", "text": "Την ενθαλπία εξάτμισης 1 mol υγρού νερού"}, {"id": "C", "text": "Την ενθαλπία τήξης του πάγου"}, {"id": "D", "text": "Την ενθαλπία διάλυσης νερού"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Από νόμο Hess: $H_2O(l) \\rightarrow H_2O(g)$, $\\Delta H = -242-(-286) = +44$ kJ. Αυτή είναι η ενθαλπία εξάτμισης 1 mol νερού ($\\Delta H_{vap} = +44$ kJ/mol). Θετική — ενδόθερμη διαδικασία.", "common_mistake": "Συγχέεται εξάτμιση με τήξη — η τήξη αφορά μετάβαση στερεού → υγρού.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Α4 5ου διαγωνίσματος"}, {"id": "CH2_006", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["πρότυπη-ενθαλπία", "φυσική-κατάσταση", "εξάρτηση"], "learning_objective": "Γνώση από τι εξαρτάται η πρότυπη ενθαλπία αντίδρασης", "question": "Η πρότυπη ενθαλπία της αντίδρασης $H_2(g) + \\frac{1}{2}O_2(g) \\rightarrow H_2O$ εξαρτάται από:", "options": [{"id": "A", "text": "Τη θερμοκρασία διεξαγωγής της αντίδρασης"}, {"id": "B", "text": "Την πίεση και τη θερμοκρασία"}, {"id": "C", "text": "Τον τρόπο γραφής της εξίσωσης (συντελεστές και φυσική κατάσταση αντιδρώντων και προϊόντων)"}, {"id": "D", "text": "Την ποσότητα $H_2$ που αντιδρά"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Η $\\Delta H^\\circ$ αλλάζει αν: (α) αλλάξουν οι στοιχειομετρικοί συντελεστές, (β) αλλάξει η φυσική κατάσταση αντιδρώντων ή προϊόντων. Σε πρότυπες συνθήκες (298 K, 1 atm) η τιμή είναι συγκεκριμένη για συγκεκριμένη γραφή.", "common_mistake": "Θεωρείται ότι η $\\Delta H^\\circ$ αλλάζει με τη θερμοκρασία — στις πρότυπες συνθήκες είναι σταθερή.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Α1 1ου διαγωνίσματος"}, {"id": "CH2_007", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["νόμος-Hess", "ορισμός", "πορεία"], "learning_objective": "Κατανόηση νόμου Hess", "question": "Σύμφωνα με τον νόμο Hess, η ενθαλπία μιας αντίδρασης εξαρτάται μόνο από την αρχική και τελική κατάσταση του συστήματος, ανεξάρτητα από την πορεία.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Ο νόμος Hess είναι συνέπεια της αρχής διατήρησης ενέργειας. Η ενθαλπία είναι συνάρτηση κατάστασης — δεν εξαρτάται από το πώς φτάσαμε από αντιδρώντα σε προϊόντα.", "common_mistake": "Συγχέεται με την ταχύτητα αντίδρασης που εξαρτάται από την πορεία (μηχανισμό).", "image_url": null, "source": "Σχολικό βιβλίο, §2.2"}, {"id": "CH2_008", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["νόμος-Hess", "θερμοχημικός-κύκλος", "C2H2", "C2H4", "C2H6"], "learning_objective": "Εφαρμογή νόμου Hess σε θερμοχημικό κύκλο", "question": "Δίνονται: $C_2H_2 + H_2 \\rightarrow C_2H_4$, $\\Delta H_1$ και $C_2H_4 + H_2 \\rightarrow C_2H_6$, $\\Delta H_2$. Η ενθαλπία της αντίδρασης $C_2H_2 + 2H_2 \\rightarrow C_2H_6$ είναι:", "options": [{"id": "A", "text": "$\\Delta H_1 - \\Delta H_2$"}, {"id": "B", "text": "$\\Delta H_2 - \\Delta H_1$"}, {"id": "C", "text": "$\\Delta H_1 + \\Delta H_2$"}, {"id": "D", "text": "$\\Delta H_1 \\cdot \\Delta H_2$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Αθροίζοντας τις δύο αντιδράσεις: το $C_2H_4$ εμφανίζεται ως προϊόν στην 1η και ως αντιδρών στη 2η → απαλείφεται. Η συνολική $\\Delta H = \\Delta H_1 + \\Delta H_2$.", "common_mistake": "Χρησιμοποιείται αφαίρεση αντί πρόσθεση — λανθασμένη εφαρμογή Hess.", "image_url": null, "source": "Σχολικό βιβλίο, §2.2 — Θέμα Α4 1ου διαγωνίσματος"}, {"id": "CH2_009", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["αντίστροφη-αντίδραση", "πρόσημο-ΔΗ"], "learning_objective": "Γνώση αλλαγής πρόσημου ΔΗ για αντίστροφη αντίδραση", "question": "Αν $A \\rightarrow B$, $\\Delta H = -100$ kJ, τότε για την αντίστροφη αντίδραση $B \\rightarrow A$ ισχύει $\\Delta H = +100$ kJ.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Η αντιστροφή αντίδρασης αλλάζει το πρόσημο της ενθαλπίας. Αν η $A \\rightarrow B$ είναι εξώθερμη ($-100$ kJ), τότε η $B \\rightarrow A$ είναι ενδόθερμη ($+100$ kJ).", "common_mistake": "Θεωρείται ότι η ενθαλπία παραμένει ίδια για αντίστροφη αντίδραση.", "image_url": null, "source": "Σχολικό βιβλίο, §2.2"}, {"id": "CH2_010", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["υπολογισμός-ΔΗ", "ΔHf°", "νόμος-Hess"], "learning_objective": "Υπολογισμός ενθαλπίας αντίδρασης από πρότυπες ενθαλπίες σχηματισμού", "question": "Δίνονται: $\\Delta H_f^\\circ(CO) = -110$ kJ/mol, $\\Delta H_f^\\circ(CO_2) = -393$ kJ/mol. Η ενθαλπία καύσης 1 mol $CO(g)$ ($CO + \\frac{1}{2}O_2 \\rightarrow CO_2$) είναι:", "options": [{"id": "A", "text": "$-693$ kJ"}, {"id": "B", "text": "$+283$ kJ"}, {"id": "C", "text": "$-283$ kJ"}, {"id": "D", "text": "$-173$ kJ"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$\\Delta H = \\Delta H_f^\\circ(CO_2) - [\\Delta H_f^\\circ(CO) + \\Delta H_f^\\circ(\\frac{1}{2}O_2)] = -393 - (-110 + 0) = -393 + 110 = -283$ kJ. ($\\Delta H_f^\\circ(O_2) = 0$ — στοιχείο σε πρότυπη μορφή.)", "common_mistake": "Αθροίζονται αντί να αφαιρούνται τα αντιδρώντα από τα προϊόντα, ή αγνοείται ότι $\\Delta H_f^\\circ(O_2) = 0$.", "image_url": null, "source": "Σχολικό βιβλίο, §2.2 — Θέμα Β2δ 4ου διαγωνίσματος"}, {"id": "CH2_011", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ενεργειακό-διάγραμμα", "Ea", "ΔΗ", "ανάγνωση"], "learning_objective": "Ανάγνωση ενεργειακού διαγράμματος — σχέση Ea και ΔΗ", "question": "Σε ενεργειακό διάγραμμα εξώθερμης αντίδρασης ($\\Delta H < 0$), η ενέργεια ενεργοποίησης της αντίστροφης αντίδρασης ($E_{a,\\text{αντ}}$) σε σχέση με αυτή της ευθείας ($E_{a,\\text{ευθ}}$) είναι:", "options": [{"id": "A", "text": "$E_{a,\\text{αντ}} < E_{a,\\text{ευθ}}$"}, {"id": "B", "text": "$E_{a,\\text{αντ}} = E_{a,\\text{ευθ}}$"}, {"id": "C", "text": "$E_{a,\\text{αντ}} > E_{a,\\text{ευθ}}$"}, {"id": "D", "text": "Δεν μπορεί να συγκριθεί"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Για εξώθερμη αντίδραση ισχύει: $E_{a,\\text{αντ}} = E_{a,\\text{ευθ}} + |\\Delta H|$, άρα $E_{a,\\text{αντ}} > E_{a,\\text{ευθ}}$. Τα προϊόντα βρίσκονται σε χαμηλότερο ενεργειακό επίπεδο από τα αντιδρώντα, οπότε η αντίστροφη αντίδραση χρειάζεται μεγαλύτερη ενέργεια ενεργοποίησης.", "common_mistake": "Θεωρείται ότι $E_{a,\\text{αντ}} = E_{a,\\text{ευθ}}$ — αγνοείται η διαφορά ενθαλπίας.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Β1 2ου διαγωνίσματος"}, {"id": "CH2_012", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["καταλύτης", "ΔΗ", "Ea", "αμετάβλητο"], "learning_objective": "Κατανόηση επίδρασης καταλύτη στην ενθαλπία αντίδρασης", "question": "Η παρουσία καταλύτη μειώνει την ενέργεια ενεργοποίησης αλλά ΔΕΝ μεταβάλλει την ενθαλπία ($\\Delta H$) της αντίδρασης.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Ο καταλύτης προσφέρει εναλλακτική πορεία με χαμηλότερη $E_a$ — μειώνει την $E_a$ τόσο της ευθείας όσο και της αντίστροφης αντίδρασης κατά το ίδιο ποσό. Αρχική και τελική κατάσταση παραμένουν ίδιες, άρα η $\\Delta H$ (που είναι συνάρτηση κατάστασης) δεν αλλάζει.", "common_mistake": "Θεωρείται ότι ο καταλύτης αλλάζει και την ενθαλπία — αλλά αυτή εξαρτάται μόνο από αρχική και τελική κατάσταση.", "image_url": null, "source": "Σχολικό βιβλίο, §2.1 — Θέμα Β1 2ου διαγωνίσματος"}, {"id": "CH2_013", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["ενεργειακό- lta H_1 = -296{,}9$ kJ και $S(s) + \\frac{3}{2}O_2(g) \\rightarrow SO_3(g)$, $\\Delta H_2 = -396{,}9$ kJ. Η ενθαλπία της αντίδρασης $SO_2(g) + \\frac{1}{2}O_2(g) \\rightarrow SO_3(g)$ είναι:", "options": [{"id": "A", "text": "$-100$ kJ"}, {"id": "B", "text": "$+100$ kJ"}, {"id": "C", "text": "$-693{,}8$ kJ"}, {"id": "D", "text": "$-196{,}9$ kJ"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Αντιστρέφω (1): $SO_2 \\rightarrow S + O_2$, $\\Delta H = +296{,}9$ kJ. Προσθέτω (2): $S + \\frac{3}{2}O_2 \\rightarrow SO_3$, $\\Delta H = -396{,}9$ kJ. Άθροισμα: $SO_2 + \\frac{1}{2}O_2 \\rightarrow SO_3$, $\\Delta H = +296{,}9 + (-396{,}9) = -100$ kJ.", "common_mistake": "Δεν αντιστρέφεται η (1) — χρησιμοποιείται ως έχει με αποτέλεσμα λανθασμένο $\\Delta H$.", "image_url": null, "source": "Σχολικό βιβλίο, §2.2 — Θέμα Γ2 2ου διαγωνίσματος"}];
const CH3 = [{"id": "CH3_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ετερογενής-κατάλυση", "θεωρία-προσρόφησης", "Ni", "αιθένιο"], "learning_objective": "Αναγνώριση θεωρίας που ερμηνεύει την ετερογενή κατάλυση", "question": "Η προσθήκη λεπτότατα διαμερισμένου $Ni(s)$ επιταχύνει την υδρογόνωση του αιθενίου: $CH_2{=}CH_2(g) + H_2(g) \\xrightarrow{Ni(s)} CH_3{-}CH_3(g)$. Αυτό ερμηνεύεται με τη θεωρία:", "options": [{"id": "A", "text": "Της ομογενούς κατάλυσης"}, {"id": "B", "text": "Της αυτοκατάλυσης"}, {"id": "C", "text": "Της προσρόφησης"}, {"id": "D", "text": "Των ενδιάμεσων σταδίων"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Ο $Ni(s)$ είναι στερεός καταλύτης για αέρια αντιδρώντα → ετερογενής κατάλυση. Ερμηνεύεται από τη θεωρία προσρόφησης: τα μόρια $C_2H_4$ και $H_2$ προσροφώνται στην επιφάνεια του Ni, αδυνατίζουν οι δεσμοί τους και αντιδρούν.", "common_mistake": "Επιλέγεται 'ομογενής κατάλυση' — αλλά ο Ni είναι στερεός ενώ τα αντιδρώντα αέρια → διαφορετικές φάσεις = ετερογενής.", "image_url": null, "source": "Σχολικό βιβλίο, §3.2 — Θέμα Α1 1ου και 5ου διαγωνίσματος"}, {"id": "CH3_002", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["νόμος-ταχύτητας", "τάξη", "απλή-σύνθετη", "στοιχειομετρία"], "learning_objective": "Ερμηνεία νόμου ταχύτητας — τάξη αντίδρασης και χαρακτηρισμός ως απλή/σύνθετη", "question": "Ο νόμος ταχύτητας της αντίδρασης $A(g) + 2B(g) \\rightarrow \\Gamma(g)$ βρέθηκε πειραματικά: $u = k \\cdot C_A \\cdot C_B$. Η αντίδραση:", "options": [{"id": "A", "text": "Είναι 3ης συνολικής τάξης και απλή"}, {"id": "B", "text": "Είναι 2ης συνολικής τάξης και χαρακτηρίζεται ως δεύτερης τάξης ως προς Β"}, {"id": "C", "text": "Είναι 2ης συνολικής τάξης και γίνεται σε περισσότερα του ενός στάδια"}, {"id": "D", "text": "Είναι 2ης συνολικής τάξης και απλή"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Συνολική τάξη = $1+1 = 2$. Ο εκθέτης του $C_B$ είναι 1, ενώ αι οι συγκεντρώσεις τους → μειώνεται η ταχύτητα → ο $\\Gamma$ παράγεται με μειούμενο ρυθμό. Ωστόσο η ποσότητα $\\Gamma$ συνεχίζει να αυξάνεται (απλώς όλο και πιο αργά).", "common_mistake": "Συγχέεται η μείωση ρυθμού παραγωγής με τη μείωση ποσότητας — η ποσότητα αυξάνεται συνεχώς, ο ρυθμός αύξησης μειώνεται.", "image_url": null, "source": "Σχολικό βιβλίο, §3.1 — Θέμα Β2β 1ου και 5ου διαγωνίσματος"}, {"id": "CH3_007", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["θερμοκρασία", "Ea", "Maxwell-Boltzmann", "ταχύτητα"], "learning_objective": "Ερμηνεία επίδρασης θερμοκρασίας στην ταχύτητα μέσω κατανομής Maxwell-Boltzmann", "question": "Η αύξηση θερμοκρασίας αυξάνει την ταχύτητα αντίδρασης κυρίως γιατί:", "options": [{"id": "A", "text": "Μειώνεται η ενέργεια ενεργοποίησης $E_a$"}, {"id": "B", "text": "Αυξάνεται το ποσοστό των μορίων που έχουν ενέργεια $\\geq E_a$"}, {"id": "C", "text": "Αλλάζει ο μηχανισμός της αντίδρασης"}, {"id": "D", "text": "Αυξάνεται η ενέργεια ενεργοποίησης $E_a$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Η αύξηση θερμοκρασίας μετατοπίζει την κατανομή Maxwell-Boltzmann προς υψηλότερες ενέργειες. Αυξάνεται σημαντικά το ποσοστό μορίων με $E \\geq E_a$, άρα αυξάνονται οι αποτελεσματικές κρούσεις. Η $E_a$ δεν αλλάζει με τη θερμοκρασία.", "common_mistake": "Θεωρείται ότι η θερμοκρασία μειώνει την $E_a$ — αλλά η $E_a$ είναι χαρακτηριστικό της αντίδρασης, όχι της θερμοκρασίας.", "image_url": null, "source": "Σχολικό βιβλίο, §3.2 — Θέμα Β1ii 2ου διαγωνίσματος"}, {"id": "CH3_008", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["θερμοκρασία", "ΔΗ", "αμετάβλητο"], "learning_objective": "Κατανόηση ότι αύξηση θερμοκρασίας δεν αλλάζει ΔΗ αντίδρασης", "question": "Με την αύξηση της θερμοκρασίας, η τιμή του $\\Delta H$ μιας χημικής αντίδρασης μεταβάλλεται.", "correct_answer": {"type": "boolean", "value": false}, "explanation": "Το $\\Delta H$ εξαρτάται από τις ενθαλπίες αρχικής και τελικής κα "Η σταθερά ταχύτητας $k$ εξαρτάται από τη φύση και τη θερμοκρασία, όχι από την ποσότητα του καταλύτη. Διπλασιασμός καταλύτη δεν διπλασιάζει $k$ → δεν διπλασιάζει ταχύτητα.", "common_mistake": "Συγχέεται ο καταλύτης με αντιδρών — η ποσότητα αντιδρώντος επηρεάζει ταχύτητα, η ποσότητα καταλύτη όχι με απλή αναλογία.", "image_url": null, "source": "Σχολικό βιβλίο, §3.2 — Θέμα Β1v 2ου διαγωνίσματος"}, {"id": "CH3_011", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["σχέση-ταχυτήτων", "στοιχειομετρία", "παραγωγή-κατανάλωση"], "learning_objective": "Σχέση ταχύτητας παραγωγής προϊόντος με ταχύτητα κατανάλωσης αντιδρώντος", "question": "Στην αντίδραση $N_2(g) + 3H_2(g) \\rightarrow 2NH_3(g)$, αν η ταχύτητα κατανάλωσης του $N_2$ είναι $u_{N_2}$, τότε η ταχύτητα παραγωγής $NH_3$ είναι:", "options": [{"id": "A", "text": "$u_{NH_3} = u_{N_2}$"}, {"id": "B", "text": "$u_{NH_3} = 3 \\cdot u_{N_2}$"}, {"id": "C", "text": "$u_{NH_3} = 2 \\cdot u_{N_2}$"}, {"id": "D", "text": "$u_{NH_3} = \\frac{1}{2} \\cdot u_{N_2}$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Από στοιχειομετρία: 1 mol $N_2$ καταναλώνεται για κάθε 2 mol $NH_3$ που παράγονται. Άρα $u_{NH_3} = 2 \\cdot u_{N_2}$. Γενικά: $\\frac{u_A}{\\nu_A} = \\frac{u_B}{\\nu_B}$ όπου $\\nu$ ο στοιχειομετρικός συντελεστής.", "common_mistake": "Χρησιμοποιείται ο συντελεστής του $H_2$ (3) αντί του $NH_3$ (2).", "image_url": null, "source": "Σχολικό βιβλίο, §3.1"}, {"id": "CH3_012", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["νόμος-ταχύτητας", "πειραματικά-δεδομένα", "ClO2", "NaOH", "τάξη"], "learning_objective": "Εύρεση νόμου ταχύτητας από πειραματικά δεδομένα", "question": "Από πειράματα για την αντίδραση $2ClO_2(aq) + 2NaOH(aq) \\rightarrow NaClO_3(aq) + NaClO_2(aq) + H_2O(l)$ προέκυψαν: Πείραμα 1: $[ClO_2]=0{,}4$ M, $[NaOH]=0{,}2$ M, $u=0{,}8$ M/s. Πείραμα 2: $[ClO_2]=0{,}2$ M, $[NaOH]=0{,}2$ M, $u=0{,}2$ M/s. Πείραμα 3: $[ClO_2]=0{,}2$ M, $[NaOH]=0{,}4$ M, $u=0{,}4$ M/s. Ο νόμος ταχύτητας είναι:", "options": [{"id": "A", "text": "$u = k \\cdot [ClO_2] \\cdot [NaOH]$"}, {"id": "B", "text": "$u = k \\cdot [ClO_2]^2 \\cdot [NaOH]^2$"}, {"id": "C", "text": "$u = k \\cdot [ClO_2]^2 \\cdot [NaOH]$"}, {"id": "D", "text": "$u = k \\cdot [ClO_2] \\cdot [NaOH]^2$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Πειράματα 1→2: $[ClO_2]$ ÷2, $[NaOH]$ σταθερό, $u$: $0{,}8 \\div 0{,}2 = 4$. Άρα $(1/2)^x = 1/4 \\Rightarrow x=2$. Πειράματα 2→3: $[NaOH]$ ×2, $[ClO_2]$ σταθερό, $u$: $0{,}4 \\div 0{,}2 = 2$. Άρα $2^y = 2 \\Rightarrow y=1$. Νόμος: $u = k[ClO_2]^2[NaOH]$.", "common_mistake": "Λανθασμένη σύγκριση πειραμάτων — π.χ. σύγκριση 1→3 αντί 1→2 για τον $ClO_2$.", "image_url": null, "source": "Σχολικό βιβλίο, §3.3 — Θέμα Γ1α 4ου διαγωνίσματος"}, {"id": "CH3_013", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["σταθερά-ταχύτητας", "k", "υπολογισμός", "ClO2"], "learning_objective": "Υπολογισμός σταθεράς ταχύτητας k από πειραματικά δεδομένα", "question": "Για την αντίδραση $2ClO_2(aq) + 2NaOH(aq) \\rightarrow NaClO_3(aq) + NaClO_2(aq) + H_2O(l)$ ισχύει ο νόμος ταχύτητας $u = k[ClO_2]^2[NaOH]$. Δίνονται τα εξής πειραματικά δεδομένα: Πείραμα 1: $[ClO_2]=0{,}4$ M, $[NaOH]=0{,}2$ M, $u=0{,}8$ M/s. Πείραμα 2: $[ClO_2]=0{,}2$ M, $[NaOH]=0{,}2$ M, $u=0{,}2$ M/s. Η σταθερά $k$ είναι:", "options": [{"id": "A", "text": "$k = 10$ $M^{-2}s^{-1}$"}, {"id": "B", "text": "$k = 25$ $M^{-2}s^{-1}$"}, {"id": "C", "text": "$k = 50$ $M^{-2}s^{-1}$"}, {"id": "D", "text": "$k = 5$ $M^{-2}s^{-1}$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Χρησιμοποιώ πείραμα 1: $k = \\frac{u}{[ClO_2]^2 \\cdot [NaOH]} = \\frac{0{,}8}{(0{,}4)^2 \\cdot (0{,}2)} = \\frac{0{,}8}{0{,}16 \\times 0{,}2} = \\frac{0{,}8}{0{,}032} = 25$ $M^{-2}s^{-1}$. Επαλήθευση με πείραμα 2: $\\frac{0{,}2}{(0{,}2)^2(0{,}2)} = \\frac{0{,}2}{0{,}008} = 25$ ✓.", "common_mistake": "Λανθασμένη χρήση εκθετών — υπολογισμός $k = u/([ClO_2][NaOH])$ αντί $u/([ClO_2]^2[NaOH])$.", "image_url": null, "source": "Σχολικό βιβλίο, §3.3 — Θέμα Γ1β 4ου διαγωνίσματος"}, {"id": "CH3_014", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["μηχανισμός", "ενδιάμεσο-προϊόν", "καταλύτης", "διάκριση"], "learning_objective": "Διάκριση ενδιάμεσου προϊόντος από καταλύτη στον μηχανισμό αντίδρασης", "question": "Στη σύνθετη αντίδραση $2NO(g) + O_2(g) \\rightarrow 2NO_2(g)$ που γίνεται σε δύο στάδια: (1) $2NO \\rightarrow N_2O_2$ και (2) $N_2O_2 + O_2 \\rightarrow 2NO_2$, η ένωση $N_2O_2$ είναι:", "options": [{"id": "A", "text": "Καταλύτης — παράγεται στο 1ο στάδιο και αναγεννάται στο 2ο"}, {"id": "B", "text": "Ενδιάμεσο προϊόν — παράγεται στο 1ο στάδιο και καταναλώνεται στο 2ο"}, {"id": "C", "text": "Τελικό προϊόν της αντίδρασης"}, {"id": "D", "text": "Αντιδρών της ολικής αντίδρασης"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Το $N_2O_2$ παράγεται στο 1ο στάδιο και καταναλώνεται στο 2ο → δεν εμφανίζεται στην ολική αντίδραση → είναι ενδιάμεσο προϊόν. Καταλύτης θα ήταν αν καταναλωνόταν σε ένα στάδιο και αναγεννιόταν σε άλλο.", "common_mistake": "Συγχέεται ενδιάμεσο προϊόν με καταλύτη — η διαφορά: καταλύτης υπάρχει πριν ΚΑΙ μετά την αντίδραση, ενδιάμεσο μόνο κατά τη διάρκεια.", "image_url": null, "source": "Σχολικό βιβλίο, §3.3"}, {"id": "CH3_015", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["μέση-ταχύτητα", "ορισμός", "συγκέντρωση-χρόνος"], "learning_objective": "Κατανόηση ορισμού μέσης ταχύτητας αντίδρασης", "question": "Η μέση ταχύτητα μιας χημικής αντίδρασης σε χρονικό διάστημα $\\Delta t$ ορίζεται ως:", "options": [{"id": "A", "text": "$\\bar{u} = \\frac{\\Delta t}{\\Delta[X]}$"}, {"id": "B", "text": "$\\bar{u} = \\Delta[X] \\cdot \\Delta t$"}, {"id": "C", "text": "$\\bar{u} = \\frac{|\\Delta[X]|}{\\Delta t}$"}, {"id": "D", "text": "$\\bar{u} = \\frac{\\Delta[X]}{\\Delta t^2}$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Μέση ταχύτητα = $\\frac{|\\Delta[X]|}{\\Delta t}$ όπου $\\Delta[X]$ η μεταβολή συγκέντρωσης αντιδρώντος ή προϊόντος. Η απόλυτη τιμή χρησιμοποιείται για να είναι πάντα θετική.", "common_mistake": "Αντιστρέφεται ο λόγος: $\\Delta t / \\Delta[X]$ αντί $\\Delta[X] / \\Delta t$.", "image_url": null, "source": "Σχολικό βιβλίο, §3.1"}, {"id": "CH3_016", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["μείωση-ταχύτητας", "παράγοντες", "C-CO2-CO", "επιφάνεια"], "learning_objective": "Αναγνώριση ενέργειας που οδηγεί σε μείωση ταχύτητας", "question": "Ποια από τις παρακάτω ενέργειες θα οδηγήσει σε ΜΕΙΩΣΗ της αρχικής ταχύτητας της αντίδρασης $C(s) + CO_2(g) \\rightarrow 2CO(g)$;", "options": [{"id": "A", "text": "Αύξηση θερμοκρασίας"}, {"id": "B", "text": "Μείωση πίεσης μέσω αύξησης του όγκου του δοχείου"}, {"id": "C", "text": "Χρήση ίδιας ποσότητας $C(s)$ σε λεπτότερο διαμερισμό"}, {"id": "D", "text": "Προσθήκη ποσότητας $CO_2$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Αύξηση όγκου → μείωση $[CO_2]$ → μείωση ταχύτητας. Α: αύξηση θερμοκρ. → αύξηση ταχύτ. Γ: λεπτότερος διαμερισμός $C(s)$ → μεγαλύτερη επιφάνεια επαφής → αύξηση ταχύτ. Δ: προσθήκη $CO_2$ → αύξηση $[CO_2]$ → αύξηση ταχύτ.", "common_mistake": "Επιλέγεται Γ — αλλά ο λεπτότερος διαμερισμός αυξάνει (δεν μειώνει) την ταχύτητα.", "image_url": null, "source": "Σχολικό βιβλίο, §3.2 — Θέμα Α3 2ου διαγωνίσματος"}];
const CH4 = [{"id": "CH4_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ισορροπία", "δυναμική", "ορισμός", "ταχύτητες"], "learning_objective": "Κατανόηση δυναμικής φύσης χημικής ισορροπίας", "question": "Σε κατάσταση χημικής ισορροπίας:", "options": [{"id": "A", "text": "Οι αντιδράσεις έχουν σταματήσει εντελώς"}, {"id": "B", "text": "Η ταχύτητα της ευθείας αντίδρασης ισούται με την ταχύτητα της αντίστροφης"}, {"id": "C", "text": "Οι συγκεντρώσεις αντιδρώντων και προϊόντων είναι ίσες μεταξύ τους"}, {"id": "D", "text": "Τα αντιδρώντα έχουν μετατραπεί πλήρως σε προϊόντα"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Η χημική ισορροπία είναι δυναμική: και οι δύο αντιδράσεις (ευθεία και αντίστροφη) συνεχίζονται με ίσες ταχύτητες. Οι συγκεντρώσεις παραμένουν σταθερές — δεν σημαίνει ότι είναι ίσες μεταξύ τους.", "common_mistake": "Θεωρείται ότι η ισορροπία σημαίνει ίσες συγκεντρώσεις αντιδρώντων-προϊόντων ή σταμάτημα αντιδράσεων.", "image_url": null, "source": "Σχολικό βιβλίο, §4.1"}, {"id": "CH4_002", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Kc", "έκφραση", "N2", "H2", "NH3"], "learning_objective": "Γραφή σωστής έκφρασης Kc", "question": "Η σωστή έκφραση της $K_c$ για την αμφίδρομη αντίδραση $N_2(g) + 3H_2(g) \\rightleftharpoons 2NH_3(g)$ είναι:", "options": [{"id": "A", "text": "$K_c = \\frac{[NH_3]^2}{[N_2][H_2]^3}$"}, {"id": "B", "text": "$K_c = \\frac{[N_2][H_2]^3}{[NH_3]^2}$"}, {"id": "C", "text": "$K_c = \\frac{[NH_3]}{[N_2][H_2]}$"}, {"id": "D", "text": "$K_c = \\frac{2[NH_3]}{[N_2] \\cdot 3[H_2]}$"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "$K_c = \\frac{[\\text{προϊόντα}]^{\\text{συντελεστές}}}{[\\text{αντιδρώντα}]^{\\text{συντελεστές}}} = \\frac{[NH_3]^2}{[N_2]^1[H_2]^3}$. Οι εκθέτες είναι οι στοιχειομετρικοί συντελεστές, ΟΧΙ πολλαπλάσια.", "common_mistake": "Αντιστρέφεται ο λόγος (Β) ή χρησιμοποιούνται οι συντελεστές ως πολλαπλάσια αντί εκθέτες (Δ).", "image_url": null, "source": "Σχολικό βιβλίο, §4.3"}, {"id": "CH4_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Kc", "έκφραση", "στερεά", "CaCO3"], "learning_objective": "Γνώση ότι στερεά και καθαρά υγρά δεν εμφανίζονται στην Kc", "question": "Η σωστή έκφραση της $K_c$ για την ετερογενή ισορροπία $CaCO_3(s) \\rightleftharpoons CaO(s) + CO_2(g)$ είναι:", "options": [{"id": "A", "text": "$K_c = \\frac{[CaO][CO_2]}{[CaCO_3]}$"}, {"id": "B", "text": "$K_c = [CO_2]$"}, {"id": "C", "text": "$K_c = \\frac{[CO_2]}{[CaCO_3]}$"}, {"id": "D", "text": "$K_c = [CaO][CO_2]$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Τα στερεά ($CaCO_3$ και $CaO$) έχουν σταθερή 'συγκέντρωση' και δεν εμφανίζονται στην $K_c$. Η μόνη μεταβλητή είναι η συγκέντρωση του $CO_2(g)$: $K_c = [CO_2]$.", "common_mistake": "Συμπεριλαμβάνονται τα στερεά στον λόγο — αυτό είναι από τα πιο συχνά λάθη.", "image_url": null, "source": "Σχολικό βιβλίο, §4.3"}, {"id": "CH4_004", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["Kc", "θερμοκρασία", "εξάρτηση"], "learning_objective": "Γνώση ότι Kc εξαρτάται μόνο από θερμοκρασία", "question": "Η σταθερά χημικής ισορροπίας $K_c$ μεταβάλλεται όταν αλλάζει η θερμοκρασία, αλλά παραμένει αμετάβλητη με αλλαγές συγκέντρωσης, πίεσης ή παρουσία καταλύτη.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Η $K_c$ εξαρτάται ΜΟΝΟ από τη θερμοκρασία. Αλλαγές σε συγκέντρωση, πίεση, ή καταλύτη μετατοπίζουν την ισορροπία αλλά δεν αλλάζουν την τιμή της $K_c$ (που ισχύει για δεδομένη θερμοκρασία).", "common_mistake": "Θεωρείται ότι η $K_c$ αλλάζει με κάθε διαταραχή — ενώ αλλάζει μόνο η θέση ισορροπίας, όχι η $K_c$.", "image_url": null, "source": "Σχολικό βιβλίο, §4.3"}, {"id": "CH4_005", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["Qc", "Kc", "κατεύθυνση", "μετατόπιση"], "learning_objective": "Πρόβλεψη κατεύθυνσης μετατόπισης με σύγκριση Qc και Kc", "question": "Για την ισορροπία $N_2(g) + 3H_2(g) \\rightleftharpoons 2NH_3(g)$, κάποια στιγμή διαπιστώνεται ότι $Q_c > K_c$. Τη στιγμή αυτή:", "options": [{"id": "A", "text": "Η αντίδραση βρίσκεται σε ισορροπία"}, {"id": "B", "text": "Η αντίδραση μετατοπίζεται προς τα δεξιά"}, {"id": "C", "text": "Η αντίδραση μετατοπίζεται προς τα αριστερά"}, {"id": "D", "text": "Δεν επαρκούν τα δεδομένα"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$Q_c > K_c$: υπερβολικά πολλά προϊόντα σε σχέση με την ισορροπία → η αντίδραση μετατοπίζεται προς τα αριστερά για να μειωθούν τα προϊόντα. Κανόνας: $Q_c < K_c$ → δεξιά, $Q_c > K_c$ → αριστερά.", "common_mistake": "Αντιστρέφεται η λογική: $Q_c > K_c$ ερμηνεύεται ως προς τα δεξιά.", "image_url": null, "source": "Σχολικό βιβλίο, §4.3 — Θέμα Α5 5ου διαγωνίσματος"}, {"id": "CH4_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Le-Chatelier", "συγκέντρωση", "CH4", "H2O", "ενδόθερμη"], "learning_objective": "Εφαρμογή Le Chatelier για μεταβολή συγκέντρωσης σε ισορροπία", "question": "Στην ισορροπία $CH_4(g) + H_2O(g) \\rightleftharpoons CO(g) + 3H_2(g)$, $\\Delta H > 0$, αύξηση της συγκέντρωσης $H_2O$:", "options": [{"id": "A", "text": "Μετατοπίζει την ισορροπία προς τα αριστερά"}, {"id": "B", "text": "Μετατοπίζει την ισορροπία προς τα δεξιά"}, {"id": "C", "text": "Δεν μετατοπίζει την ισορροπία"}, {"id": "D", "text": "Αυξάνει την $K_c$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Αύξηση $[H_2O]$: το σύστημα αντιδρά για να μειώσει την αύξηση → η ισορροπία μετατοπίζεται προς τα δεξιά (προς κατανάλωση $H_2O$). Η $K_c$ δεν αλλάζει — αλλάζει μόνο η θέση ισορροπίας.", "common_mistake": "Θεωρείται ότι η $K_c$ αυξάνεται — αλλά αλλάζει μόνο η θέση, ΟΧΙ η $K_c$.", "image_url": null, "source": "Σχολικό βιβλίο, §4.2 — Θέμα Β1α 1ου διαγωνίσματος"}, {"id": "CH4_007", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Le-Chatelier", "πίεση", "mol-αερίων", "CH4-H2O"], "learning_objective": "Εφαρμογή Le Chatelier για μεταβολή πίεσης", "question": "Στην ισορροπία $CH_4(g) + H_2O(g) \\rightleftharpoons CO(g) + 3H_2(g)$, αύξηση της πίεσης μέσω ελάττωσης του όγκου μετατοπίζει την ισορροπία:", "options": [{"id": "A", "text": "Προς τα δεξιά — υπάρχουν περισσότερα mol αερίου εκεί"}, {"id": "B", "text": "Προς τα αριστερά — υπάρχουν λιγότερα mol αερίου εκεί"}, {"id": "C", "text": "Δεν μετατοπίζεται — ίσα mol αερίου και στις δύο πλευρές"}, {"id": "D", "text": "Εξαρτάται από τη θερμοκρασία"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Αριστερά: $1 + 1 = 2$ mol αερίου. Δεξιά: $1 + 3 = 4$ mol αερίου. Αύξηση πίεσης → μετατόπιση προς λιγότερα mol = αριστερά. Η $K_c$ δεν αλλάζει.", "common_mistake": "Λανθασμένη μέτρηση mol αερίων — μετριέται μόνο ο $H_2$ (3 mol) χωρίς να προστεθεί το $CO$ (1 mol).", "image_url": null, "source": "Σχολικό βιβλίο, §4.2 — Θέμα Β1β 1ου διαγωνίσματος"}, {"id": "CH4_008", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Le-Chatelier", "θερμοκρασία", "ενδόθερμη", "Kc", "απόδοση"], "learning_objective": "Εφαρμογή Le Chatelier για αύξηση θερμοκρασίας σε ενδόθερμη αντίδραση", "question": "Στην ισορροπία $CH_4(g) + H_2O(g) \\rightleftharpoons CO(g) + 3H_2(g)$, $\\Delta H > 0$, αύξηση θερμοκρασίας:", "options": [{"id": "A", "text": "$K_c$ αυξάνεται, απόδοση αυξάνεται, $u_{\\rightarrow}$ αυξάνεται"}, {"id": "B", "text": "$K_c$ μειώνεται, απόδοση μειώνεται, $u_{\\rightarrow}$ αυξάνεται"}, {"id": "C", "text": "$K_c$ αμετάβλητη, απόδοση αυξάνεται, $u_{\\rightarrow}$ αυξάνεται"}, {"id": "D", "text": "$K_c$ αυξάνεται, απόδοση μειώνεται, $u_{\\rightarrow}$ αυξάνεται"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "$\\Delta H > 0$ (ενδόθερμη): αύξηση $T$ ευνοεί την ενδόθερμη κατεύθυνση (→) → $K_c \\uparrow$, απόδοση ↑. Επίσης αύξηση $T$ πάντα αυξάνει $u_{\\rightarrow}$ και $u_{\\leftarrow}$, αλλά η $u_{\\rightarrow}$ αυξάνεται περισσότερο → νέα ισορροπία με μεγαλύτερη $K ζει ισορροπία. Μάζα $C(s)$ ✗: στερεό, δεν εμφανίζεται στην $K_c$. Καταλύτης ✗: αυξάνει ταχύτητα επίτευξης ισορροπίας αλλά ΔΕΝ αλλάζει θέση ισορροπίας.", "common_mistake": "Επιλέγεται Β — θεωρείται ότι ο καταλύτης αλλάζει θέση ισορροπίας.", "image_url": null, "source": "Σχολικό βιβλίο, §4.2 — Θέμα Α4 4ου διαγωνίσματος"}, {"id": "CH4_013", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ομογενής-ισορροπία", "ετερογενής", "φάσεις"], "learning_objective": "Διάκριση ομογενούς από ετερογενή ισορροπία", "question": "Ποιες από τις παρακάτω ισορροπίες είναι ομογενείς;", "options": [{"id": "A", "text": "Μόνο η $N_2(g) + 3H_2(g) \\rightleftharpoons 2NH_3(g)$"}, {"id": "B", "text": "Μόνο η εστεροποίηση $CH_3COOH(l) + CH_3OH(l) \\rightleftharpoons CH_3COOCH_3(l) + H_2O(l)$"}, {"id": "C", "text": "Και η $N_2 + 3H_2 \\rightleftharpoons 2NH_3$ και η εστεροποίηση"}, {"id": "D", "text": "Καμία — όλες είναι ετερογενείς"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Ομογενής ισορροπία: ΟΛΑ τα συστατικά στην ίδια φάση. $N_2+3H_2 \\rightleftharpoons 2NH_3$: όλα αέρια ✓. Εστεροποίηση: όλα υγρά ✓. Και οι δύο είναι ομογενείς.", "common_mistake": "Θεωρείται ότι μόνο αέρια συστατικά δίνουν ομογενή ισορροπία — αλλά και υγρές φάσεις μπορούν.", "image_url": null, "source": "Σχολικό βιβλίο, §4.1 — Θέμα Α5 4ου διαγωνίσματος"}, {"id": "CH4_014", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Le-Chatelier", "θερμοκρασία", "εξώθερμη", "N2-H2-NH3", "Kc"], "learning_objective": "Εφαρμογή Le Chatelier για αύξηση θερμοκρασίας σε εξώθερμη αντίδραση", "question": "Για την εξώθερμη ισορροπία $N_2(g) + 3H_2(g) \\rightleftharpoons 2NH_3(g)$, $\\Delta H < 0$, αύξηση θερμοκρασίας:", "options": [{"id": "A", "text": "Μετατοπίζει προς δεξιά και $K_c$ αυξάνεται"}, {"id": "B", "text": "Μετατοπίζει προς αριστερά και $K_c$ μειώνεται"}, {"id": "C", "text": "Δεν μετατοπίζει αλλά $K_c$ αυξάνεται"}, {"id": "D", "text": "Μετατοπίζει προς αριστερά και $ const CH5_1_2 = [{"id": "CH5_1_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["Brønsted-Lowry", "ορισμός", "οξύ", "βάση"], "learning_objective": "Κατανόηση ορισμού οξέος και βάσης κατά Brønsted-Lowry", "question": "Κατά τη θεωρία Brønsted-Lowry, βάση είναι κάθε ουσία που:", "options": [{"id": "A", "text": "Παράγει $OH^-$ στο νερό"}, {"id": "B", "text": "Δέχεται πρωτόνιο ($H^+$)"}, {"id": "C", "text": "Δίνει πρωτόνιο ($H^+$)"}, {"id": "D", "text": "Παράγει $H^+$ στο νερό"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Κατά Brønsted-Lowry: οξύ = δότης πρωτονίου ($H^+$), βάση = δέκτης πρωτονίου. Ο ορισμός αυτός είναι ευρύτερος από τον Arrhenius (που απαιτεί $OH^-$ για βάση).", "common_mistake": "Συγχέεται με τον ορισμό Arrhenius — επιλέγεται Α ('παράγει $OH^-$').", "image_url": null, "source": "Σχολικό βιβλίο, §5.1"}, {"id": "CH5_1_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["Arrhenius", "Brønsted-Lowry", "NH3", "σύγκριση"], "learning_objective": "Διάκριση θεωριών Arrhenius και Brønsted-Lowry", "question": "Η $NH_3$ χαρακτηρίζεται ως βάση κατά Brønsted-Lowry αλλά ΟΧΙ κατά Arrhenius. Γιατί;", "options": [{"id": "A", "text": "Γιατί δεν περιέχει $OH^-$ στο μόριό της"}, {"id": "B", "text": "Γιατί δεν διαλύεται στο νερό"}, {"id": "C", "text": "Γιατί δεν δέχεται πρωτόνια"}, {"id": "D", "text": "Γιατί παράγει $H^+$ στο νερό"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Κατά Arrhenius, βάση είναι μόνο ουσία που παράγει $OH^-$ στο νερό — η $NH_3$ δεν έχει $OH^-$ στον τύπο της, άρα δεν είναι βάση κατά Arrhenius. Όμως η $NH_3$ δέχεται $H^+$ ($NH_3 + H^+ \\rightarrow NH_4^+$) → είναι βάση κατά Brønsted-Lowry.", "common_mistake": "Θεωρείται ότι η $NH_3$ δεν είναι βάση με κανέναν ορισμό.", "image_url": null, "source": "Σχολικό βιβλίο, §5.1"}, {"id": "CH5_1_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["συζυγές-ζεύγος", "HSO4-", "SO4²-"], "learni , "correct_answer": {"type": "boolean", "value": true}, "explanation": "Ο αυτοϊοντισμός του νερού: $H_2O \\rightleftharpoons H^+ + OH^-$. Στους 25°C: $K_w = [H^+][OH^-] = 10^{-14}$ $M^2$. Αυτή η τιμή ισχύει ΜΟΝΟ στους 25°C — αυξάνεται με τη θερμοκρασία.", "common_mistake": "Θεωρείται ότι $K_w = 10^{-14}$ σε κάθε θερμοκρασία.", "image_url": null, "source": "Σχολικό βιβλίο, §5.2"}, {"id": "CH5_1_006", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["pH", "pOH", "σχέση", "25°C"], "learning_objective": "Γνώση σχέσης pH + pOH = 14 στους 25°C", "question": "Διάλυμα έχει $pH = 11$ στους 25°C. Ποια είναι η $[OH^-]$;", "options": [{"id": "A", "text": "$[OH^-] = 10^{-11}$ M"}, {"id": "B", "text": "$[OH^-] = 10^{-3}$ M"}, {"id": "C", "text": "$[OH^-] = 10^{-7}$ M"}, {"id": "D", "text": "$[OH^-] = 11$ M"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$pH + pOH = 14 \\Rightarrow pOH = 14 - 11 = 3 \\Rightarrow [OH^-] = 10^{-3}$ M. Επαλήθευση: $[H^+] = 10^{-11}$ M, $[H^+][OH^-] = 10^{-11} \\times 10^{-3} = 10^{-14} = K_w$ ✓.", "common_mistake": "Επιλέγεται $[OH^-] = 10^{-11}$ — συγχέεται η $[OH^-]$ με $[H^+]$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.2 — Θέμα Α2 6ου διαγωνίσματος"}, {"id": "CH5_1_007", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["pH", "HCl", "ισχυρό-οξύ", "υπολογισμός"], "learning_objective": "Υπολογισμός pH διαλύματος ισχυρού οξέος", "question": "Το $pH$ υδατικού διαλύματος $HCl$ συγκέντρωσης $0{,}01$ M είναι:", "options": [{"id": "A", "text": "$pH = 1$"}, {"id": "B", "text": "$pH = 2$"}, {"id": "C", "text": "$pH = 12$"}, {"id": "D", "text": "$pH = 7$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$HCl$ ισχυρό οξύ → πλήρης ιοντισμός: $[H^+] = 0{,}01 = 10^{-2}$ M. $pH = -\\log[H^+] = -\\log(10^{-2}) = 2$.", "common_mistake": "Επιλέγεται $pH=1$ — λανθασμένος υπολογισμός του λογαρίθμου.", "image_url": null, "source": "Σχολικό βιβλίο, §5.2 — Θέμα Α3 3ου διαγωνίσματος"}, {"id": "CH5_1_008", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["pH", "NaOH", "ισχυρή-βάση", "υπολογισμός"], "learning_objective": "Υπολογισμός pH διαλύματος ισχυρής βάσης", "question": "Το $pH$ υδατικού διαλύματος $NaOH$ συγκέντρωσης $0{,}001$ M στους 25°C είναι:", "options": [{"id": "A", "text": "$pH = 3$"}, {"id": "B", "text": "$pH = 7$"}, {"id": "C", "text": "$pH = 11$"}, {"id": "D", "text": "$pH = 13$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$NaOH$ ισχυρή βάση → $[OH^-] = 0{,}001 = 10^{-3}$ M. $pOH = 3$. $pH = 14 - 3 = 11$.", "common_mistake": "Επιλέγεται $pH=3$ — υπολογίζεται $pH$ αντί $pOH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.2 — Θέμα Β3 6ου διαγωνίσματος"}, {"id": "CH5_1_009", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Ka", "ισχύς-οξέος", "σύγκριση", "CH3COOH", "HCN"], "learning_objective": "Σύγκριση ισχύος οξέων με βάση Ka", "question": "Δίνεται: $K_a(CH_3COOH) = 1{,}8 \\times 10^{-5}$ και $K_a(HCN) = 4 \\times 10^{-10}$. Ποιο οξύ είναι ισχυρότερο και γιατί;", "options": [{"id": "A", "text": "Το $HCN$ — γιατί έχει μικρότερη τιμή $K_a$"}, {"id": "B", "text": "Το $CH_3COOH$ — γιατί έχει μεγαλύτερη τιμή $K_a$"}, {"id": "C", "text": "Είναι εξίσου ισχυρά"}, {"id": "D", "text": "Εξαρτάται από τη συγκέντρωση"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Μεγαλύτερη $K_a$ = μεγαλύτερος βαθμός ιοντισμού = ισχυρότερο οξύ. $K_a(CH_3COOH) = 1{,}8 \\times 10^{-5} \\gg K_a(HCN) = 4 \\times 10^{-10}$ → το $CH_3COOH$ είναι ισχυρότερο.", "common_mistake": "Αντιστρέφεται: μικρότερη $K_a$ θεωρείται ισχυρότερο οξύ.", "image_url": null, "source": "Σχολικό βιβλίο, §5.2 — Θέμα Α4 3ου διαγωνίσματος"}, {"id": "CH5_1_010", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ισχυρό-οξύ", "βαθμός-ιοντισμού", "αραίωση"], "learning_objective": "Κατανόηση βαθμού ιοντισμού ισχυρού οξέος", "question": "Το $HCl$ είναι ισχυρό οξύ — ο βαθμός ι const CH5_3 = [{"id": "CH5_3_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["Ka", "έκφραση", "ασθενές-οξύ", "ΗΑ"], "learning_objective": "Γραφή σωστής έκφρασης Ka για ασθενές οξύ", "question": "Για το ασθενές οξύ $HA$ που ιοντίζεται: $HA \\rightleftharpoons H^+ + A^-$, η έκφραση της $K_a$ είναι:", "options": [{"id": "A", "text": "$K_a = \\frac{[H^+][A^-]}{[HA]}$"}, {"id": "B", "text": "$K_a = \\frac{[HA]}{[H^+][A^-]}$"}, {"id": "C", "text": "$K_a = [H^+][A^-]$"}, {"id": "D", "text": "$K_a = \\frac{[H^+]}{[HA]}$"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Η $K_a$ γράφεται ως: προϊόντα στον αριθμητή, αντιδρώντα στον παρονομαστή. Το $H_2O$ (διαλύτης) δεν εμφανίζεται. $K_a = \\frac{[H^+][A^-]}{[HA]}$.", "common_mistake": "Αντιστρέφεται ο λόγος (επιλογή Β) ή παραλείπεται το $[HA]$ (επιλογή Γ).", "image_url": null, "source": "Σχολικό βιβλίο, §5.3"}, {"id": "CH5_3_002", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["pH", "ασθενές-οξύ", "υπολογισμός", "Ka"], "learning_objective": "Υπολογισμός pH ασθενούς οξέος με τον προσεγγιστικό τύπο", "question": "Ασθενές οξύ $HA$ με $K_a = 10^{-5}$ σε συγκέντρωση $C = 0{,}1$ M. Ποιο είναι το $pH$ του διαλύματος;", "options": [{"id": "A", "text": "$pH = 1$"}, {"id": "B", "text": "$pH = 2$"}, {"id": "C", "text": "$pH = 3$"}, {"id": "D", "text": "$pH = 5$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$[H^+] = \\sqrt{K_a \\cdot C} = \\sqrt{10^{-5} \\times 0{,}1} = \\sqrt{10^{-6}} = 10^{-3}$ M. $pH = 3$. Προϋπόθεση: $K_a \\ll C$ ($10^{-5} \\ll 0{,}1$) ✓ — η προσέγγιση ισχύει.", "common_mistake": "Επιλέγεται $pH=5$ — συγχέεται η τιμή $K_a$ με το $pH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.3 — Θέμα Β1 6ου διαγωνίσματος"}, {"id": "CH5_3_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["βαθμός-ιοντισμού", "α", "υπολογισμός"], "learning_objective": "Υπολογισμός βαθμού ιοντισμού ασθενούς οξέος", "question": "Ασθενές οξύ $HA$, $K_a = 10^{-5}$, $C = 0{,}1$ M. Ο βαθμός ιοντισμού $a$ είναι:", "options": [{"id": "A", "text": "$a = 10\\%$"}, {"id": "B", "text": "$a = 0{,}1\\%$"}, {"id": "C", "text": "$a = 1\\%$"}, {"id": "D", "text": "$a = 5\\%$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$[H^+] = \\sqrt{K_a \\cdot C} = \\sqrt{10^{-5} \\times 0{,}1} = 10^{-3}$ M. $a = \\frac{[H^+]}{C} = \\frac{10^{-3}}{0{,}1} = 10^{-2} = 1\\%$. Εναλλακτικά: $a = \\sqrt{K_a/C} = \\sqrt{10^{-5}/10^{-1}} = \\sqrt{10^{-4}} = 10^{-2} = 1\\%$.", "common_mistake": "Υπολογίζεται $a = K_a/C = 10^{-4}$ — λησμονείται η τετραγωνική ρίζα.", "image_url": null, "source": "Σχολικό βιβλίο, §5.3 — Θέμα Β1 6ου διαγωνίσματος"}, {"id": "CH5_3_004", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["βαθμός-ιοντισμού", "αραίωση", "αύξηση"], "learning_objective": "Κατανόηση επίδρασης αραίωσης στον βαθμό ιοντισμού", "question": "Κατά την αραίωση διαλύματος ασθενούς οξέος, ο βαθμός ιοντισμού αυξάνεται ενώ η $K_a$ παραμένει αμετάβλητη (σε σταθερή θερμοκρασία).", "correct_answer": {"type": "boolean", "value": true}, "explanation": "$a = \\sqrt{K_a/C}$. Αραίωση → $C$ μειώνεται → $a$ αυξάνεται. Η $K_a$ εξαρτάται μόνο από τη θερμοκρασία, όχι τη συγκέντρωση. Φυσική ερμηνεία: σε αραιό διάλυμα η ισορροπία μετατοπίζεται προς ιοντισμό (αρχή Le Chatelier).", "common_mistake": "Θεωρείται ότι η αραίωση αυξάνει και την $K_a$ — αλλά η $K_a$ είναι σταθερά ισορροπίας, εξαρτάται μόνο από θερμοκρασία.", "image_url": null, "source": "Σχολικό βιβλίο, §5.3"}, {"id": "CH5_3_005", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Ka-Kb", "συζυγές-ζεύγος", "Kw", "σχέση"], "learning_objective": "Εφαρμογή σχέσης Ka×Kb = Kw για συζυγές ζεύγος", "question": "Δίνεται $K_a(CH_3COOH) = 1{,}8 \\times 10^{-5}$. Η $K_b$ του $CH_3COO^-$ (συζυγής βάση) είναι:", "options": [{"id": "A", "text": "$K_b = 1{,}8 \\times 10^{-5}$"}, {"id": "B", "text": "$K_b \\approx 5{,}6 \\times 10^{-1 xt": "$HA$ ισχυρότερο οξύ, $B^-$ ισχυρότερη βάση"}, {"id": "C", "text": "$HA$ ισχυρότερο οξύ, $A^-$ ισχυρότερη βάση"}, {"id": "D", "text": "$HB$ ισχυρότερο οξύ, $A^-$ ισχυρότερη βάση"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$K_a(HA) > K_a(HB)$ → $HA$ ισχυρότερο οξύ. Όσο ισχυρότερο το οξύ, τόσο ασθενέστερη η συζυγής βάση: $K_b(A^-) = 10^{-14}/10^{-4} = 10^{-10}$ και $K_b(B^-) = 10^{-14}/10^{-7} = 10^{-7}$. Άρα $B^-$ ισχυρότερη βάση ($K_b(B^-) > K_b(A^-)$).", "common_mistake": "Θεωρείται ότι ισχυρότερο οξύ = ισχυρότερη συζυγής βάση — αλλά ισχύει το αντίθετο.", "image_url": null, "source": "Σχολικό βιβλίο, §5.3"}, {"id": "CH5_3_010", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Kb", "NH3", "ασθενής-βάση", "pH"], "learning_objective": "Υπολογισμός pH ασθενούς βάσης", "question": "Διάλυμα $NH_3$ $0{,}1$ M με $K_b = 10^{-5}$. Ποιο είναι το $pH$ του διαλύματος;", "options": [{"id": "A", "text": "$pH = 3$"}, {"id": "B", "text": "$pH = 9$"}, {"id": "C", "text": "$pH = 11$"}, {"id": "D", "text": "$pH = 5$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$NH_3 + H_2O \\rightleftharpoons NH_4^+ + OH^-$. $[OH^-] = \\sqrt{K_b \\times C} = \\sqrt{10^{-5} \\times 0{,}1} = \\sqrt{10^{-6}} = 10^{-3}$ M. $pOH = 3$. $pH = 14 - 3 = 11$.", "common_mistake": "Επιλέγεται $pH=3$ — υπολογίζεται $pOH$ αντί $pH$, χωρίς αφαίρεση από 14.", "image_url": null, "source": "Σχολικό βιβλίο, §5.3"}, {"id": "CH5_3_011", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["προσεγγιστικός-τύπος", "προϋπόθεση", "α-μικρό"], "learning_objective": "Γνώση προϋπόθεσης εφαρμογής προσεγγιστικού τύπου", "question": "Ο τύπος $[H^+] = \\sqrt{K_a \\cdot C}$ ισχύει ακριβώς μόνο όταν ο βαθμός ιοντισμού είναι πολύ μικρός ($a \\ll 1$), δηλαδή $K_a \\ll C$.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Ο ακριβής τύπος (νόμος αραίωσης Ostwald): $K_a = \\frac{a^2 C}{1 - a}$. Αν $a \\ll 1$, τότε $1 - a \\a
