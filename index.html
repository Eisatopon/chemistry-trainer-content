const CH5_5 = [{"id": "CH5_5_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ρυθμιστικό", "ορισμός", "pH"], "learning_objective": "Κατανόηση ορισμού ρυθμιστικού διαλύματος", "question": "Ρυθμιστικό διάλυμα είναι το διάλυμα που:", "options": [{"id": "A", "text": "Έχει πάντα $pH = 7$"}, {"id": "B", "text": "Αντιστέκεται σε μεγάλες μεταβολές $pH$ κατά την προσθήκη μικρών ποσοτήτων ισχυρού οξέος ή βάσης"}, {"id": "C", "text": "Περιέχει μόνο ισχυρά οξέα και βάσεις"}, {"id": "D", "text": "Δεν μεταβάλλει ποτέ το $pH$ του"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Ρυθμιστικό διάλυμα: διατηρεί το $pH$ σχεδόν σταθερό κατά την προσθήκη μικρών ποσοτήτων ισχυρού οξέος ή βάσης. ΔΕΝ σημαίνει $pH = 7$ — μπορεί να έχει οποιοδήποτε $pH$ ανάλογα με τα συστατικά του.", "common_mistake": "Θεωρείται ότι ρυθμιστικό = ουδέτερο ($pH=7$).", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ρυθμιστικό", "σύσταση", "αναγνώριση"], "learning_objective": "Αναγνώριση ρυθμιστικού διαλύματος από τα συστατικά του", "question": "Ποιο από τα παρακάτω μείγματα αποτελεί ρυθμιστικό διάλυμα;", "options": [{"id": "A", "text": "$HCl$ + $NaCl$"}, {"id": "B", "text": "$NaOH$ + $NaCl$"}, {"id": "C", "text": "$CH_3COOH$ + $CH_3COONa$"}, {"id": "D", "text": "$HCl$ + $NaOH$ (ίσα mol)"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Ρυθμιστικό = ασθενές οξύ + συζυγής βάση (άλας). $CH_3COOH$ (ασθενές οξύ) + $CH_3COONa$ (άλας, παρέχει $CH_3COO^-$, συζυγής βάση) ✓. Α: $HCl$ ισχυρό οξύ + $NaCl$ άλας — δεν είναι ρυθμιστικό. Δ: ίσα mol $HCl + NaOH$ → εξουδετέρωση → $NaCl$, ουδέτερο.", "common_mistake": "Επιλέγεται Α — αλλά το $HCl$ είναι ισχυρό οξύ, δεν σχηματίζει ρυθμιστικό.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστικό", "δράση", "προσθήκη-οξέος"], "learning_objective": "Κατανόηση δράσης ρυθμιστικού κατά προσθήκη ισχυρού οξέος", "question": "Σε ρυθμιστικό διάλυμα $CH_3COOH/CH_3COO^-$ προστίθεται μικρή ποσότητα $HCl$. Ποια αντίδραση απορροφά τα $H^+$;", "options": [{"id": "A", "text": "$CH_3COOH + H^+ \\rightarrow CH_3COO^- + 2H^+$"}, {"id": "B", "text": "$CH_3COO^- + H^+ \\rightarrow CH_3COOH$"}, {"id": "C", "text": "$H_2O + H^+ \\rightarrow H_3O^+$"}, {"id": "D", "text": "$CH_3COOH \\rightarrow CH_3COO^- + H^+$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Τα $H^+$ από το $HCl$ αντιδρούν με τη συζυγή βάση $CH_3COO^-$: $CH_3COO^- + H^+ \\rightarrow CH_3COOH$. Έτσι τα $H^+$ απορροφώνται και το $pH$ μεταβάλλεται ελάχιστα. Αυτός είναι ο μηχανισμός προστασίας από οξύ.", "common_mistake": "Θεωρείται ότι το $CH_3COOH$ (οξύ) αντιδρά με $H^+$ — αλλά η βάση ($CH_3COO^-$) είναι αυτή που δεσμεύει τα $H^+$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_004", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστικό", "δράση", "προσθήκη-βάσης"], "learning_objective": "Κατανόηση δράσης ρυθμιστικού κατά προσθήκη ισχυρής βάσης", "question": "Σε ρυθμιστικό διάλυμα $CH_3COOH/CH_3COO^-$ προστίθεται μικρή ποσότητα $NaOH$. Ποια αντίδραση απορροφά τα $OH^-$;", "options": [{"id": "A", "text": "$CH_3COO^- + OH^- \\rightarrow CH_3COOH + O^{2-}$"}, {"id": "B", "text": "$CH_3COO^- + OH^- \\rightarrow$ προϊόν"}, {"id": "C", "text": "$CH_3COOH + OH^- \\rightarrow CH_3COO^- + H_2O$"}, {"id": "D", "text": "$H_2O + OH^- \\rightarrow 2OH^-$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Τα $OH^-$ από το $NaOH$ αντιδρούν με το ασθενές οξύ $CH_3COOH$: $CH_3COOH + OH^- \\rightarrow CH_3COO^- + H_2O$. Τα $OH^-$ εξουδετερώνονται και το $pH$ αυξάνεται ελάχιστα. Αυτός είναι ο μηχανισμός προστασίας από βάση.", "common_mistake": "Επιλέγεται Β — αλλά το $CH_3COO^-$ (βάση) δεν αντιδρά με $OH^-$ (επίσης βάση). Αντιδρά το οξύ $CH_3COOH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_005", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστικό", "pH", "ίσες-C", "pKa"], "learning_objective": "Γνώση ότι pH ρυθμιστικού = pKa όταν C_acid = C_salt", "question": "Σε ρυθμιστικό διάλυμα $HA/A^-$ όταν $[HA] = [A^-]$, το $pH$ του διαλύματος ισούται με το $pK_a$ του οξέος $HA$.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "$[H^+] = K_a \\times \\frac{[HA]}{[A^-]}$. Αν $[HA] = [A^-]$: $[H^+] = K_a \\Rightarrow pH = pK_a$. Από την εξίσωση Henderson-Hasselbalch: $pH = pK_a + \\log\\frac{[A^-]}{[HA]}$. Για ίσες συγκεντρώσεις: $\\log(1) = 0$ → $pH = pK_a$.", "common_mistake": "Θεωρείται ότι $[HA]=[A^-]$ δίνει $pH=7$ — αλλά $pH=pK_a$ που εξαρτάται από το οξύ.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5 — Θέμα Γ1 3ου διαγωνίσματος"}, {"id": "CH5_5_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστικό", "παρασκευή", "ανάμειξη"], "learning_objective": "Κατανόηση παρασκευής ρυθμιστικού από ανάμειξη οξέος και βάσης", "question": "Ανακατεύουμε $100$ mL $CH_3COOH$ $0{,}1$ M με $50$ mL $NaOH$ $0{,}1$ M. Τι προκύπτει;", "options": [{"id": "A", "text": "Διάλυμα $CH_3COONa$ μόνο — πλήρης εξουδετέρωση"}, {"id": "B", "text": "Ρυθμιστικό διάλυμα $CH_3COOH/CH_3COO^-$"}, {"id": "C", "text": "Διάλυμα $HCl$ — περίσσεια οξέος"}, {"id": "D", "text": "Ουδέτερο διάλυμα με $pH = 7$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "mol $CH_3COOH = 0{,}1 \\times 0{,}1 = 0{,}01$ mol. mol $NaOH = 0{,}05 \\times 0{,}1 = 0{,}005$ mol. Αντίδραση: $CH_3COOH + NaOH \\rightarrow CH_3COONa + H_2O$. Παράγεται $0{,}005$ mol $CH_3COONa$, απομένει $0{,}005$ mol $CH_3COOH$. Ίσα mol οξέος και άλατος → ρυθμιστικό με $pH = pK_a \\approx 4{,}74$.", "common_mistake": "Θεωρείται πλήρης εξουδετέρωση — αλλά το $NaOH$ είναι μισό από το $CH_3COOH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5 — Θέμα Γ1 3ου διαγωνίσματος"}, {"id": "CH5_5_007", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["ρυθμιστικό", "pH", "Henderson-Hasselbalch", "υπολογισμός"], "learning_objective": "Υπολογισμός pH ρυθμιστικού με τον τύπο Henderson-Hasselbalch", "question": "Ρυθμιστικό διάλυμα περιέχει $CH_3COOH$ $0{,}2$ M και $CH_3COONa$ $0{,}1$ M. $K_a = 10^{-5}$. Ποιο είναι το $pH$;", "options": [{"id": "A", "text": "$pH = 5$"}, {"id": "B", "text": "$pH \\approx 4{,}7$"}, {"id": "C", "text": "$pH = 3$"}, {"id": "D", "text": "$pH \\approx 5{,}3$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$[H^+] = K_a \\times \\frac{[CH_3COOH]}{[CH_3COO^-]} = 10^{-5} \\times \\frac{0{,}2}{0{,}1} = 2 \\times 10^{-5}$ M. $pH = -\\log(2 \\times 10^{-5}) = 5 - \\log 2 \\approx 5 - 0{,}3 = 4{,}7$. Ή: $pH = pK_a + \\log\\frac{0{,}1}{0{,}2} = 5 + \\log(0{,}5) = 5 - 0{,}3 \\approx 4{,}7$.", "common_mistake": "Επιλέγεται $pH=5$ — αγνοείται ο λόγος $C_{\\text{οξύ}}/C_{\\text{άλας}} = 2$ που μετατοπίζει το $pH$ κάτω από το $pK_a$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_008", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["ρυθμιστικό", "βασικό", "NH3", "NH4Cl", "pH"], "learning_objective": "Υπολογισμός pH βασικού ρυθμιστικού NH3/NH4+", "question": "Ρυθμιστικό διάλυμα περιέχει $NH_3$ $0{,}1$ M και $NH_4Cl$ $0{,}1$ M. $K_b(NH_3) = 10^{-5}$. Ποιο είναι το $pH$;", "options": [{"id": "A", "text": "$pH = 5$"}, {"id": "B", "text": "$pH = 7$"}, {"id": "C", "text": "$pH = 9$"}, {"id": "D", "text": "$pH = 11$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "$[OH^-] = K_b \\times \\frac{[NH_3]}{[NH_4^+]} = 10^{-5} \\times \\frac{0{,}1}{0{,}1} = 10^{-5}$ M. $pOH = 5$. $pH = 14 - 5 = 9$.", "common_mistake": "Επιλέγεται $pH=5$ — υπολογίζεται $pOH$ χωρίς αφαίρεση από 14.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5 — Θέμα Γ1 6ου διαγωνίσματος"}, {"id": "CH5_5_009", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστικό", "pH-μετά-προσθήκη", "μικρή-μεταβολή"], "learning_objective": "Κατανόηση ότι το pH ρυθμιστικού μεταβάλλεται ελαφρά κατά προσθήκη οξέος/βάσης", "question": "Η προσθήκη μικρής ποσότητας ισχυρού οξέος σε ρυθμιστικό διάλυμα μεταβάλλει ελαφρά το $pH$ του, αλλά δεν το διατηρεί απολύτως σταθερό.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Το ρυθμιστικό διάλυμα ΔΕΝ κρατά το $pH$ απολύτως σταθερό — το αλλάζει ελάχιστα. Αυτό που κάνει είναι να αντιστέκεται σε ΜΕΓΑΛΕΣ μεταβολές. Η ρυθμιστική ικανότητα είναι πεπερασμένη.", "common_mistake": "Θεωρείται ότι το ρυθμιστικό κρατά το $pH$ απολύτως αναλλοίωτο — αυτό δεν ισχύει.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}, {"id": "CH5_5_010", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ρυθμιστική-ικανότητα", "συγκέντρωση", "εξάρτηση"], "learning_objective": "Κατανόηση από τι εξαρτάται η ρυθμιστική ικανότητα", "question": "Η ρυθμιστική ικανότητα ενός ρυθμιστικού διαλύματος εξαρτάται κυρίως από:", "options": [{"id": "A", "text": "Μόνο από την τιμή $K_a$ του ασθενούς οξέος"}, {"id": "B", "text": "Μόνο από τη θερμοκρασία"}, {"id": "C", "text": "Τις συγκεντρώσεις των συστατικών (οξέος και άλατος)"}, {"id": "D", "text": "Μόνο από το $pH$ του διαλύματος"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Σύμφωνα με το σχολικό βιβλίο, οι συγκεντρώσεις των συστατικών πρέπει να είναι σχετικά υψηλές ώστε το διάλυμα να έχει ικανοποιητική ρυθμιστική ικανότητα. Όσο μεγαλύτερες οι συγκεντρώσεις οξέος και συζυγούς βάσης, τόσο μεγαλύτερη η αντοχή στις μεταβολές $pH$. Η $K_a$ καθορίζει το $pH$ αλλά ΌΧΙ την ικανότητα.", "common_mistake": "Θεωρείται ότι η ρυθμιστική ικανότητα εξαρτάται μόνο από $K_a$ ή $pH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.5"}];
const CH5_6 = [{"id": "CH5_6_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["δείκτης", "ορισμός", "χρώμα"], "learning_objective": "Κατανόηση ορισμού και δράσης δείκτη pH", "question": "Ένας δείκτης $pH$ είναι:", "options": [{"id": "A", "text": "Ισχυρό οξύ που αλλάζει χρώμα"}, {"id": "B", "text": "Ασθενές οξύ ή βάση που αλλάζει χρώμα ανάλογα με το $pH$ του διαλύματος"}, {"id": "C", "text": "Ουδέτερη ουσία που μετράει το $pH$"}, {"id": "D", "text": "Ισχυρή βάση που αλλάζει χρώμα"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Οι δείκτες $pH$ είναι ασθενή οξέα ή βάσεις των οποίων η οξεία και η βασική μορφή έχουν διαφορετικά χρώματα. Αλλάζουν χρώμα σε συγκεκριμένο εύρος $pH$.", "common_mistake": "Θεωρείται ότι ο δείκτης είναι ισχυρό οξύ — αλλά τότε θα ιοντιζόταν πλήρως και δεν θα άλλαζε χρώμα με το $pH$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}, {"id": "CH5_6_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["ισοδύναμο-σημείο", "ορισμός", "ογκομέτρηση"], "learning_objective": "Κατανόηση ορισμού ισοδύναμου σημείου", "question": "Το ισοδύναμο σημείο (Ι.Σ.) σε μια ογκομέτρηση οξέος-βάσης είναι το σημείο κατά το οποίο:", "options": [{"id": "A", "text": "Το $pH = 7$ πάντοτε"}, {"id": "B", "text": "Τα mol οξέος ισούνται με τα mol βάσης που έχουν προστεθεί"}, {"id": "C", "text": "Ο δείκτης αλλάζει χρώμα"}, {"id": "D", "text": "Η συγκέντρωση οξέος ισούται με τη συγκέντρωση βάσης"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Στο Ι.Σ. τα mol οξέος = mol βάσης (στοιχειομετρική εξουδετέρωση). Το $pH = 7$ ΜΟΝΟ για ισχυρό οξύ + ισχυρή βάση. Για άλλους συνδυασμούς το $pH$ στο Ι.Σ. είναι ≠ 7.", "common_mistake": "Θεωρείται ότι Ι.Σ. = $pH 7$ πάντα.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}, {"id": "CH5_6_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ισοδύναμο-σημείο", "pH", "ασθενές-οξύ", "ισχυρή-βάση"], "learning_objective": "Πρόβλεψη pH στο ισοδύναμο σημείο ανάλογα με τον τύπο οξέος-βάσης", "question": "Στην ογκομέτρηση $CH_3COOH$ (ασθενές οξύ) με $NaOH$ (ισχυρή βάση), το $pH$ στο ισοδύναμο σημείο (Ι.Σ.) είναι:", "options": [{"id": "A", "text": "$pH = 7$ — εξουδετέρωση"}, {"id": "B", "text": "$pH < 7$ — βάση περίσσεια"}, {"id": "C", "text": "$pH > 7$ — υδρόλυση $CH_3COO^-$"}, {"id": "D", "text": "Δεν μπορεί να προβλεφθεί"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Στο Ι.Σ. σχηματίζεται $CH_3COONa$. Το $CH_3COO^-$ υδρολύεται: $CH_3COO^- + H_2O \\rightleftharpoons CH_3COOH + OH^-$ → παράγεται $OH^-$ → $pH > 7$. Κανόνας: ασθενές οξύ + ισχυρή βάση → Ι.Σ. σε $pH > 7$.", "common_mistake": "Θεωρείται $pH=7$ — λόγω εξουδετέρωσης — αλλά το άλας $CH_3COONa$ υδρολύεται.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6 — Θέμα Δ1 3ου διαγωνίσματος"}, {"id": "CH5_6_004", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ισοδύναμο-σημείο", "pH", "ασθενής-βάση", "ισχυρό-οξύ"], "learning_objective": "Πρόβλεψη pH στο ισοδύναμο σημείο για ασθενή βάση + ισχυρό οξύ", "question": "Στην ογκομέτρηση $NH_3$ (ασθενής βάση) με $HCl$ (ισχυρό οξύ), το $pH$ στο ισοδύναμο σημείο (Ι.Σ.) είναι:", "options": [{"id": "A", "text": "$pH = 7$"}, {"id": "B", "text": "$pH > 7$"}, {"id": "C", "text": "$pH < 7$"}, {"id": "D", "text": "$pH = 14$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Στο Ι.Σ. σχηματίζεται $NH_4Cl$. Το $NH_4^+$ υδρολύεται: $NH_4^+ + H_2O \\rightleftharpoons NH_3 + H_3O^+$ → παράγεται $H_3O^+$ → $pH < 7$. Κανόνας: ασθενής βάση + ισχυρό οξύ → Ι.Σ. σε $pH < 7$.", "common_mistake": "Θεωρείται $pH=7$ — αλλά το $NH_4Cl$ υδρολύεται σε όξινο διάλυμα.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6 — Θέμα Δ1 6ου διαγωνίσματος"}, {"id": "CH5_6_005", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["δείκτης", "επιλογή", "φαινολοφθαλεΐνη", "CH3COOH-NaOH"], "learning_objective": "Επιλογή κατάλληλου δείκτη για ογκομέτρηση ασθενούς οξέος με ισχυρή βάση", "question": "Για την ογκομέτρηση $CH_3COOH$ με $NaOH$, ποιος δείκτης είναι κατάλληλος;", "options": [{"id": "A", "text": "Ηλιανθίνη (μεταβολή $pH$ 3,1–4,4)"}, {"id": "B", "text": "Φαινολοφθαλεΐνη (μεταβολή $pH$ 8,2–10)"}, {"id": "C", "text": "Και οι δύο είναι εξίσου κατάλληλοι"}, {"id": "D", "text": "Κανένας — χρειάζεται $pH$-μετρο"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Το Ι.Σ. είναι σε $pH > 7$ (περίπου 8–9). Η φαινολοφθαλεΐνη αλλάζει χρώμα στο εύρος $pH$ 8,2–10 → περιλαμβάνει το Ι.Σ. ✓. Η ηλιανθίνη αλλάζει στο $pH$ 3,1–4,4 → αλλάζει πολύ πριν το Ι.Σ. ✗.", "common_mistake": "Επιλέγεται ηλιανθίνη — αλλά αλλάζει χρώμα σε όξινο $pH$, ενώ το Ι.Σ. είναι βασικό.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6 — Θέμα Δ1 3ου διαγωνίσματος"}, {"id": "CH5_6_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["δείκτης", "επιλογή", "ηλιανθίνη", "NH3-HCl"], "learning_objective": "Επιλογή κατάλληλου δείκτη για ογκομέτρηση ασθενούς βάσης με ισχυρό οξύ", "question": "Για την ογκομέτρηση $NH_3$ με $HCl$, ποιος δείκτης είναι κατάλληλος;", "options": [{"id": "A", "text": "Φαινολοφθαλεΐνη (μεταβολή $pH$ 8,2–10)"}, {"id": "B", "text": "Ηλιανθίνη (μεταβολή $pH$ 3,1–4,4)"}, {"id": "C", "text": "Και οι δύο"}, {"id": "D", "text": "Κανένας"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Το Ι.Σ. είναι σε $pH < 7$ (λόγω υδρόλυσης $NH_4^+$). Η ηλιανθίνη αλλάζει στο $pH$ 3,1–4,4 — το εύρος αυτό βρίσκεται στο κατακόρυφο τμήμα της καμπύλης ογκομέτρησης κοντά στο Ι.Σ. ✓. Η φαινολοφθαλεΐνη αλλάζει στο $pH$ 8,2–10 → αλλάζει πολύ πριν το Ι.Σ. ✗.", "common_mistake": "Επιλέγεται φαινολοφθαλεΐνη — αλλά αλλάζει σε βασικό $pH$, ενώ το Ι.Σ. είναι όξινο.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6 — Θέμα Δ1 6ου διαγωνίσματος"}, {"id": "CH5_6_007", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["ισοδύναμο-σημείο", "ισχυρό-ισχυρό", "pH-7"], "learning_objective": "Γνώση pH στο ισοδύναμο σημείο για ισχυρό οξύ + ισχυρή βάση", "question": "Στην ογκομέτρηση $HCl$ με $NaOH$, το $pH$ στο ισοδύναμο σημείο είναι 7.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "$HCl + NaOH \\rightarrow NaCl + H_2O$. Το $NaCl$ είναι άλας ισχυρού οξέος + ισχυρής βάσης → δεν υδρολύεται → $pH = 7$. Αυτή είναι η μόνη περίπτωση που Ι.Σ. = $pH 7$.", "common_mistake": "Γενικεύεται: θεωρείται ότι κάθε ογκομέτρηση δίνει $pH=7$ στο Ι.Σ.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}, {"id": "CH5_6_008", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["ογκομέτρηση", "υπολογισμός-C", "C1V1=C2V2"], "learning_objective": "Υπολογισμός συγκέντρωσης από ογκομέτρηση", "question": "Για την ογκομέτρηση $20{,}0$ mL άγνωστης συγκέντρωσης $HCl$ χρησιμοποιούνται $25{,}0$ mL $NaOH$ $0{,}1$ M μέχρι το ισοδύναμο σημείο (Ι.Σ.). Η συγκέντρωση του $HCl$ είναι:", "options": [{"id": "A", "text": "$0{,}125$ M"}, {"id": "B", "text": "$0{,}08$ M"}, {"id": "C", "text": "$0{,}1$ M"}, {"id": "D", "text": "$0{,}2$ M"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Στο Ι.Σ.: $n(HCl) = n(NaOH)$, άρα $C_1 \\cdot V_1 = C_2 \\cdot V_2$. $n(NaOH) = 0{,}025\\text{ L} \\times 0{,}1\\text{ M} = 2{,}5 \\times 10^{-3}$ mol. $C(HCl) = \\frac{n(HCl)}{V(HCl)} = \\frac{2{,}5 \\times 10^{-3}\\text{ mol}}{0{,}020\\text{ L}} = 0{,}125$ M.", "common_mistake": "Λανθασμένη εφαρμογή $C_1V_1 = C_2V_2$: αντιστρέφεται ο λόγος ή χρησιμοποιούνται λανθασμένες μονάδες.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}, {"id": "CH5_6_009", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["καμπύλη-ογκομέτρησης", "ισοδύναμο-σημείο", "απότομη-μεταβολή"], "learning_objective": "Αναγνώριση χαρακτηριστικών καμπύλης ογκομέτρησης", "question": "Στην καμπύλη ογκομέτρησης ισχυρού οξέος με ισχυρή βάση, η απότομη μεταβολή $pH$ γύρω από το ισοδύναμο σημείο (Ι.Σ.) επιτρέπει:", "options": [{"id": "A", "text": "Τη χρήση οποιουδήποτε δείκτη"}, {"id": "B", "text": "Τη χρήση μόνο φαινολοφθαλεΐνης"}, {"id": "C", "text": "Τη χρήση είτε φαινολοφθαλεΐνης είτε ηλιανθίνης — η απότομη μεταβολή καλύπτει το εύρος και των δύο"}, {"id": "D", "text": "Τη χρήση μόνο ηλιανθίνης"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Στην ογκομέτρηση ισχυρού οξέος + ισχυρής βάσης, η απότομη μεταβολή $pH$ γύρω από το Ι.Σ. ($pH = 7$) εκτείνεται από περίπου $pH$ 3 έως $pH$ 11. Αυτό καλύπτει το εύρος τόσο της ηλιανθίνης (3,1–4,4) όσο και της φαινολοφθαλεΐνης (8,2–10).", "common_mistake": "Θεωρείται ότι μόνο ένας δείκτης είναι κατάλληλος.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}, {"id": "CH5_6_010", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["σφάλμα-ογκομέτρησης", "δείκτης", "πρόωρη-αλλαγή"], "learning_objective": "Κατανόηση πρακτικής επίπτωσης λανθασμένης επιλογής δείκτη στον υπολογισμό C", "question": "Σε ογκομέτρηση $CH_3COOH$ με $NaOH$, χρησιμοποιείται κατά λάθος ηλιανθίνη αντί φαινολοφθαλεΐνης. Η ηλιανθίνη αλλάζει χρώμα σε $pH$ 3,1–4,4, δηλαδή ΠΡΙΝ το ισοδύναμο σημείο (Ι.Σ.). Η συγκέντρωση $C$ που θα υπολογιστεί για το $CH_3COOH$ θα είναι:", "options": [{"id": "A", "text": "Μεγαλύτερη από την πραγματική"}, {"id": "B", "text": "Μικρότερη από την πραγματική"}, {"id": "C", "text": "Ίση με την πραγματική"}, {"id": "D", "text": "Δεν μπορεί να προβλεφθεί"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Η ηλιανθίνη αλλάζει χρώμα ΠΡΙΝ το Ι.Σ. → σταματάμε την ογκομέτρηση νωρίτερα → έχουμε προσθέσει λιγότερο $NaOH$ από ό,τι χρειαζόταν. Υπολογισμός: $C(CH_3COOH) = \\frac{n(NaOH)_{\\text{μετρηθέν}}}{V(CH_3COOH)}$. Αφού $n(NaOH)_{\\text{μετρηθέν}} < n(NaOH)_{\\text{πραγματικό}}$, η υπολογιζόμενη $C$ θα είναι μικρότερη από την πραγματική.", "common_mistake": "Θεωρείται ότι η πρόωρη αλλαγή δείκτη δίνει μεγαλύτερη $C$ — αλλά χρησιμοποιείται λιγότερη βάση, άρα υπολογίζεται μικρότερη $C$.", "image_url": null, "source": "Σχολικό βιβλίο, §5.6"}];
const CH6 = [{"id": "CH6_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["τροχιακό", "ορισμός", "πιθανότητα"], "learning_objective": "Κατανόηση ορισμού ατομικού τροχιακού", "question": "Ατομικό τροχιακό είναι:", "options": [{"id": "A", "text": "Η κυκλική τροχιά του ηλεκτρονίου γύρω από τον πυρήνα"}, {"id": "B", "text": "Ο χώρος γύρω από τον πυρήνα όπου η πιθανότητα εντοπισμού του ηλεκτρονίου είναι περίπου 90–99%"}, {"id": "C", "text": "Η ακριβής θέση του ηλεκτρονίου ανά πάσα στιγμή"}, {"id": "D", "text": "Η τροχιά του ηλεκτρονίου σύμφωνα με το πρότυπο Bohr"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Σύμφωνα με το κβαντομηχανικό μοντέλο, το ατομικό τροχιακό είναι ο χώρος γύρω από τον πυρήνα όπου υπάρχει 90–99% πιθανότητα να βρεθεί το ηλεκτρόνιο. Δεν είναι καθορισμένη τροχιά (όπως στο Bohr) αλλά περιοχή πιθανότητας.", "common_mistake": "Συγχέεται το τροχιακό (quantum) με την τροχιά (orbit) του Bohr.", "image_url": null, "source": "Σχολικό βιβλίο, §6.1"}, {"id": "CH6_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["κβαντικοί-αριθμοί", "n", "l", "ορισμός"], "learning_objective": "Γνώση τι καθορίζει ο κάθε κβαντικός αριθμός", "question": "Ο αζιμουθιακός κβαντικός αριθμός $l$ καθορίζει:", "options": [{"id": "A", "text": "Το μέγεθος του τροχιακού"}, {"id": "B", "text": "Τον προσανατολισμό του τροχιακού"}, {"id": "C", "text": "Το σχήμα του τροχιακού"}, {"id": "D", "text": "Την ιδιοπεριστροφή του ηλεκτρονίου"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Ο $l$ καθορίζει το σχήμα του τροχιακού: $l=0$ → σφαιρικό (s), $l=1$ → αλτηροειδές (p), $l=2$ → d. Ο $n$ καθορίζει μέγεθος, ο $m_l$ προσανατολισμό, ο $m_s$ spin.", "common_mistake": "Συγχέεται $l$ (σχήμα) με $n$ (μέγεθος) ή $m_l$ (προσανατολισμός).", "image_url": null, "source": "Σχολικό βιβλίο, §6.1"}, {"id": "CH6_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["κβαντικοί-αριθμοί", "τιμές", "l", "n"], "learning_objective": "Γνώση επιτρεπτών τιμών κβαντικών αριθμών", "question": "Για $n = 3$, ποιες είναι οι επιτρεπτές τιμές του $l$;", "options": [{"id": "A", "text": "$l = 1, 2, 3$"}, {"id": "B", "text": "$l = 0, 1, 2, 3$"}, {"id": "C", "text": "$l = 0, 1, 2$"}, {"id": "D", "text": "$l = -1, 0, 1$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Ο $l$ παίρνει τιμές $0, 1, 2, \\ldots, (n-1)$. Για $n=3$: $l = 0, 1, 2$ (δηλαδή υποστιβάδες 3s, 3p, 3d). Το $l$ δεν μπορεί να ισούται με $n$.", "common_mistake": "Θεωρείται ότι $l$ αρχίζει από 1 ή ότι φτάνει μέχρι $n$ (αντί $n-1$).", "image_url": null, "source": "Σχολικό βιβλίο, §6.1"}, {"id": "CH6_004", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["τροχιακά", "αριθμός", "υποστιβάδα-p"], "learning_objective": "Γνώση αριθμού τροχιακών σε κάθε υποστιβάδα", "question": "Πόσα τροχιακά περιέχει η υποστιβάδα $3d$;", "options": [{"id": "A", "text": "1"}, {"id": "B", "text": "3"}, {"id": "C", "text": "5"}, {"id": "D", "text": "7"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Η υποστιβάδα $d$ έχει $l=2$. Αριθμός τροχιακών = $2l+1 = 2(2)+1 = 5$. Αντίστοιχα: s→1, p→3, d→5, f→7 τροχιακά. Μέγιστα e⁻: d→10.", "common_mistake": "Συγχέεται ο αριθμός τροχιακών (5) με τον μέγιστο αριθμό ηλεκτρονίων (10).", "image_url": null, "source": "Σχολικό βιβλίο, §6.1"}, {"id": "CH6_005", "type": "true_false", "difficulty": "easy", "points": 1, "tags": ["Pauli", "αρχή", "τροχιακό", "spin"], "learning_objective": "Κατανόηση απαγορευτικής αρχής Pauli", "question": "Σύμφωνα με την απαγορευτική αρχή Pauli, σε ένα τροχιακό μπορούν να υπάρχουν το πολύ δύο ηλεκτρόνια με αντίθετο spin.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Η αρχή Pauli: αδύνατο δύο ηλεκτρόνια στο ίδιο άτομο να έχουν ίδια τετράδα $(n, l, m_l, m_s)$. Αν $n, l, m_l$ ίδια (ίδιο τροχιακό), τότε το $m_s$ πρέπει να διαφέρει → αντίθετο spin → max 2 e⁻ ανά τροχιακό.", "common_mistake": "Θεωρείται ότι τα δύο ηλεκτρόνια μπορεί να έχουν ίδιο spin.", "image_url": null, "source": "Σχολικό βιβλίο, §6.2"}, {"id": "CH6_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Hund", "κανόνας", "παράλληλο-spin"], "learning_objective": "Εφαρμογή κανόνα Hund στη διάταξη ηλεκτρονίων", "question": "Το άτομο του αζώτου $({}_7N)$ έχει ηλεκτρονιακή διάταξη $1s^2 2s^2 2p^3$. Πώς κατανέμονται τα 3 ηλεκτρόνια στα τρία $2p$ τροχιακά;", "options": [{"id": "A", "text": "Δύο στο $2p_x$ και ένα στο $2p_y$"}, {"id": "B", "text": "Από ένα σε κάθε τροχιακό $2p_x$, $2p_y$, $2p_z$ με παράλληλο spin"}, {"id": "C", "text": "Από ένα σε κάθε τροχιακό με αντίθετο spin"}, {"id": "D", "text": "Τρία στο $2p_x$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Κανόνας Hund: ηλεκτρόνια σε τροχιακά ίδιας ενέργειας (ίδια υποστιβάδα) κατανέμονται με παράλληλο spin. Τα 3 e⁻ καταλαμβάνουν από ένα τροχιακό ($2p_x$, $2p_y$, $2p_z$) με το ίδιο spin (↑↑↑).", "common_mistake": "Τοποθετούνται 2 e⁻ στο ίδιο τροχιακό χωρίς να συμπληρωθούν πρώτα τα κενά.", "image_url": null, "source": "Σχολικό βιβλίο, §6.2"}, {"id": "CH6_007", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ηλεκτρονιακή-διάταξη", "Fe", "4s-3d"], "learning_objective": "Γνώση ηλεκτρονιακής διάταξης Fe και σειράς συμπλήρωσης 4s πριν 3d", "question": "Η ηλεκτρονιακή διάταξη του ${}_{26}Fe$ (σε θεμελιώδη κατάσταση) είναι:", "options": [{"id": "A", "text": "$1s^2 2s^2 2p^6 3s^2 3p^6 3d^8$"}, {"id": "B", "text": "$1s^2 2s^2 2p^6 3s^2 3p^6 4s^2 3d^6$"}, {"id": "C", "text": "$1s^2 2s^2 2p^6 3s^2 3p^6 3d^6 4s^2$"}, {"id": "D", "text": "$1s^2 2s^2 2p^6 3s^2 3p^6 3d^{10} 4s^{-4}$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Fe (Ζ=26): $1s^2 2s^2 2p^6 3s^2 3p^6 3d^6 4s^2$. Η 4s συμπληρώνεται πρώτα (κατά aufbau) αλλά γράφεται μετά την 3d. Επαλήθευση: $2+2+6+2+6+6+2 = 26$ ✓", "common_mistake": "Τοποθετούνται 8 e⁻ στη 3d ή αγνοείται η 4s.", "image_url": null, "source": "Σχολικό βιβλίο, §6.2"}, {"id": "CH6_008", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ιοντισμός", "Fe", "Fe2+", "4s-3d"], "learning_objective": "Γνώση ότι κατά τον ιοντισμό Fe→Fe²⁺ αφαιρούνται τα 4s ηλεκτρόνια", "question": "Κατά τον ιοντισμό $Fe \\rightarrow Fe^{2+}$, αφαιρούνται τα δύο ηλεκτρόνια από την υποστιβάδα $4s$ και όχι από την $3d$.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Μετά τη συμπλήρωση της 3d, αυτή αποκτά μικρότερη ενέργεια από την 4s. Άρα κατά τον ιοντισμό αφαιρούνται πρώτα τα e⁻ με τη μεγαλύτερη ενέργεια = τα 4s. $Fe^{2+}$: $1s^2 2s^2 2p^6 3s^2 3p^6 3d^6$.", "common_mistake": "Θεωρείται ότι αφαιρούνται τα 3d επειδή συμπληρώθηκαν τελευταία.", "image_url": null, "source": "Σχολικό βιβλίο, §6.2"}, {"id": "CH6_009", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["τομέας-ΠΠ", "s-p-d-f", "αναγνώριση"], "learning_objective": "Αναγνώριση τομέα περιοδικού πίνακα από ηλεκτρονιακή διάταξη", "question": "Το στοιχείο ${}_{17}Cl$ με ηλεκτρονιακή διάταξη $1s^2 2s^2 2p^6 3s^2 3p^5$ ανήκει στον τομέα:", "options": [{"id": "A", "text": "Τομέας s"}, {"id": "B", "text": "Τομέας p"}, {"id": "C", "text": "Τομέας d"}, {"id": "D", "text": "Τομέας f"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Τομέας = τύπος υποστιβάδας του τελευταίου e⁻ (κατά aufbau). Το τελευταίο e⁻ του Cl βρίσκεται στην $3p$ → τομέας p. Ομοίως: Na(3s)→s, Fe(3d)→d.", "common_mistake": "Λαμβάνεται το τελευταίο e⁻ στη γραπτή σειρά αντί της σειράς aufbau.", "image_url": null, "source": "Σχολικό βιβλίο, §6.3"}, {"id": "CH6_010", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["περίοδος", "ομάδα", "ηλεκτρόνια-σθένους"], "learning_objective": "Σύνδεση ηλεκτρονιακής διάταξης με θέση στον ΠΠ", "question": "Στοιχείο με ηλεκτρονιακή διάταξη $1s^2 2s^2 2p^6 3s^2 3p^3$ ανήκει:", "options": [{"id": "A", "text": "3η περίοδος, ομάδα IIIA"}, {"id": "B", "text": "2η περίοδος, ομάδα VA"}, {"id": "C", "text": "3η περίοδος, ομάδα VA"}, {"id": "D", "text": "3η περίοδος, ομάδα VIIA"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Αριθμός στιβάδων = 3 → 3η περίοδος. Ηλεκτρόνια εξωτερικής στιβάδας ($3s^2 3p^3$) = 5 → ομάδα VA. Το στοιχείο είναι ο ${}_{15}P$ (φώσφορος).", "common_mistake": "Μετράται ο συνολικός αριθμός ηλεκτρονίων αντί μόνο της εξωτερικής στιβάδας.", "image_url": null, "source": "Σχολικό βιβλίο, §6.3"}, {"id": "CH6_011", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ατομική-ακτίνα", "τάση", "περίοδος-ομάδα"], "learning_objective": "Γνώση τάσης μεταβολής ατομικής ακτίνας στον ΠΠ", "question": "Ποια σειρά παρουσιάζει σωστή αύξηση ατομικής ακτίνας;", "options": [{"id": "A", "text": "$F < O < N < C$"}, {"id": "B", "text": "$K < Na < Li$"}, {"id": "C", "text": "$Na < Mg < Al$"}, {"id": "D", "text": "$F < Cl < O$"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Κατά μήκος περιόδου (→): ατομική ακτίνα μειώνεται. Άρα $C > N > O > F$, δηλαδή $F < O < N < C$ ✓ (επιλογή Α). Β: λάθος — στην ομάδα ΙΑ η ακτίνα αυξάνεται προς τα κάτω: $Li < Na < K$, ΟΧΙ $K < Na < Li$. Γ: λάθος — κατά περίοδο η ακτίνα μειώνεται, άρα $Na > Mg > Al$. Δ: λάθος — Cl (3η περίοδος) > F (2η περίοδος), άρα $F < Cl$ είναι σωστό αλλά $O$ δεν συγκρίνεται εύκολα με Cl σε διαφορετική περίοδο.", "common_mistake": "Συγχέεται η τάση κατά περίοδο με κατά ομάδα.", "image_url": null, "source": "Σχολικό βιβλίο, §6.4"}, {"id": "CH6_012", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ενέργεια-ιοντισμού", "τάση", "περίοδος"], "learning_objective": "Γνώση τάσης μεταβολής ενέργειας ιοντισμού κατά περίοδο", "question": "Η πρώτη ενέργεια ιοντισμού γενικά αυξάνεται από αριστερά προς τα δεξιά σε μια περίοδο του ΠΠ.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Κατά περίοδο (→): αυξάνεται ο ατομικός αριθμός → αυξάνεται το δραστικό πυρηνικό φορτίο → e⁻ σθένους συγκρατούνται ισχυρότερα → αυξάνεται η ενέργεια ιοντισμού. (Υπάρχουν μικρές αποκλίσεις π.χ. Be>B, N>O, αλλά η γενική τάση είναι αύξηση.)", "common_mistake": "Θεωρείται ότι μειώνεται κατά περίοδο — αντιστρέφεται η τάση.", "image_url": null, "source": "Σχολικό βιβλίο, §6.4"}, {"id": "CH6_013", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ηλεκτραρνητικότητα", "τάση", "F", "μεγαλύτερη"], "learning_objective": "Γνώση τάσης ηλεκτραρνητικότητας και μεγαλύτερης τιμής", "question": "Ποιο στοιχείο έχει τη μεγαλύτερη ηλεκτραρνητικότητα;", "options": [{"id": "A", "text": "Οξυγόνο ($O$)"}, {"id": "B", "text": "Άζωτο ($N$)"}, {"id": "C", "text": "Φθόριο ($F$)"}, {"id": "D", "text": "Χλώριο ($Cl$)"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Η ηλεκτραρνητικότητα αυξάνεται → (κατά περίοδο) και ↑ (κατά ομάδα). Το φθόριο βρίσκεται στην πάνω δεξιά γωνία του ΠΠ → έχει τη μεγαλύτερη ηλεκτραρνητικότητα από όλα τα στοιχεία. Σειρά: F > O > N > Cl.", "common_mistake": "Επιλέγεται O ή Cl — αλλά F έχει τη μεγαλύτερη τιμή.", "image_url": null, "source": "Σχολικό βιβλίο, §6.4"}, {"id": "CH6_014", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["κβαντικοί-αριθμοί", "επιτρεπτή-τετράδα", "Pauli"], "learning_objective": "Αναγνώριση επιτρεπτής τετράδας κβαντικών αριθμών", "question": "Ποια από τις παρακάτω τετράδες κβαντικών αριθμών $(n, l, m_l, m_s)$ είναι επιτρεπτή;", "options": [{"id": "A", "text": "$(2, 2, 0, +\\frac{1}{2})$"}, {"id": "B", "text": "$(3, 1, -2, +\\frac{1}{2})$"}, {"id": "C", "text": "$(3, 2, -1, -\\frac{1}{2})$"}, {"id": "D", "text": "$(1, 0, 0, 0)$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Α: $n=2, l=2$: απαγορεύεται γιατί $l$ παίρνει τιμές 0 έως $n-1=1$. Β: $n=3, l=1, m_l=-2$: απαγορεύεται γιατί $m_l$ παίρνει τιμές $-l$ έως $+l$, δηλ. $-1$ έως $+1$. Γ: $n=3, l=2, m_l=-1, m_s=-\\frac{1}{2}$: όλες οι τιμές επιτρεπτές ✓. Δ: $m_s=0$ δεν επιτρέπεται — μόνο $±\\frac{1}{2}$.", "common_mistake": "Δεν ελέγχονται συστηματικά οι περιορισμοί κάθε κβαντικού αριθμού.", "image_url": null, "source": "Σχολικό βιβλίο, §6.1"}];
const CH7 = [{"id": "CH7_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["σ-δεσμός", "π-δεσμός", "διαφορά"], "learning_objective": "Διάκριση σ και π δεσμού", "question": "Ποια είναι η βασική διαφορά μεταξύ σ (σίγμα) και π (πι) δεσμού;", "options": [{"id": "A", "text": "Ο σ δεσμός είναι ασθενέστερος από τον π"}, {"id": "B", "text": "Ο σ δεσμός προκύπτει από επικάλυψη κατά τον άξονα των πυρήνων, ο π από πλευρική επικάλυψη"}, {"id": "C", "text": "Ο π δεσμός προκύπτει από επικάλυψη s-s τροχιακών"}, {"id": "D", "text": "Ο σ δεσμός υπάρχει μόνο σε αλκάνια"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Ο σ δεσμός: επικάλυψη κατά τον άξονα σύνδεσης πυρήνων (s-s, s-p, p-p) — είναι ισχυρότερος. Ο π δεσμός: πλευρική p-p επικάλυψη παράλληλων τροχιακών — είναι ασθενέστερος και σχηματίζεται μόνο μετά τον σ.", "common_mistake": "Θεωρείται ότι ο σ είναι ασθενέστερος — αντίθετα, είναι ισχυρότερος λόγω μεγαλύτερης επικάλυψης.", "image_url": null, "source": "Σχολικό βιβλίο, §7.1"}, {"id": "CH7_002", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["υβριδισμός", "sp2", "διπλός-δεσμός"], "learning_objective": "Σύνδεση υβριδισμού με τύπο δεσμού στα αλκένια", "question": "Στο μόριο του αιθενίου ($CH_2=CH_2$), κάθε άτομο C έχει υβριδισμό $sp^2$. Πόσους σ και π δεσμούς περιέχει το μόριο;", "options": [{"id": "A", "text": "5 σ και 1 π"}, {"id": "B", "text": "4 σ και 2 π"}, {"id": "C", "text": "6 σ και 0 π"}, {"id": "D", "text": "3 σ και 1 π"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Στο $CH_2=CH_2$: 1 σ δεσμός C-C + 4 σ δεσμοί C-H = 5 σ συνολικά. Ο διπλός δεσμός C=C περιέχει 1 σ + 1 π → 1 π συνολικά. Άρα: 5 σ + 1 π.", "common_mistake": "Μετριέται ο C=C ως 2 σ — αλλά ο διπλός δεσμός είναι 1 σ + 1 π.", "image_url": null, "source": "Σχολικό βιβλίο, §7.1"}, {"id": "CH7_003", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["επαγωγικό-φαινόμενο", "-Ι", "αλογόνα"], "learning_objective": "Κατανόηση επίδρασης -Ι επαγωγικού φαινομένου στην ισχύ οξέος", "question": "Το -Ι επαγωγικό φαινόμενο αλογόνων αυξάνει την ισχύ των οξυαλογονούχων οξέων, γιατί πολώνει εντονότερα τον δεσμό O-H διευκολύνοντας την απόσπαση $H^+$.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Αλογόνα με -Ι φαινόμενο τραβούν ηλεκτρόνια από τον δεσμό O-H → ο δεσμός αποδυναμώνεται → ευκολότερη απόσπαση $H^+$ → ισχυρότερο οξύ. Γι' αυτό $HClO_4 > HClO_3 > HClO_2 > HClO$ (περισσότερα O = εντονότερο -Ι).", "common_mistake": "Θεωρείται ότι το -Ι μειώνει την ισχύ του οξέος.", "image_url": null, "source": "Σχολικό βιβλίο, §7.1"}, {"id": "CH7_004", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["επαγωγικό-φαινόμενο", "+Ι", "αλκύλια", "βάσεις"], "learning_objective": "Κατανόηση επίδρασης +Ι στην ισχύ βάσης", "question": "Ποια από τις παρακάτω αμίνες είναι ισχυρότερη βάση;", "options": [{"id": "A", "text": "$NH_3$"}, {"id": "B", "text": "$CH_3NH_2$ (μεθυλαμίνη)"}, {"id": "C", "text": "$(CH_3)_2NH$ (διμεθυλαμίνη)"}, {"id": "D", "text": "$(CH_3)_3N$ (τριμεθυλαμίνη)"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Τα αλκύλια $CH_3-$ έχουν +Ι φαινόμενο: σπρώχνουν ηλεκτρόνια προς το Ν → αυξάνεται η ικανότητα του Ν να δέχεται $H^+$ → ισχυρότερη βάση. Η διμεθυλαμίνη με 2 αλκύλια είναι ισχυρότερη από μεθυλαμίνη (1) και $NH_3$ (0). Η τριμεθυλαμίνη έχει 3 αλκύλια αλλά στερεοχημικοί λόγοι μειώνουν ελαφρώς την ισχύ της.", "common_mistake": "Θεωρείται ότι περισσότερα αλκύλια = πάντα ισχυρότερη βάση (ισχύει μέχρι τη διμεθυλαμίνη).", "image_url": null, "source": "Σχολικό βιβλίο, §7.1"}, {"id": "CH7_005", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["προσθήκη", "αλκένια", "Br2", "αποχρωματισμός"], "learning_objective": "Αναγνώριση αντίδρασης προσθήκης Br2 σε αλκένιο", "question": "Κατά την αντίδραση αλκενίου με $Br_2$ σε $CCl_4$:", "options": [{"id": "A", "text": "Δεν παρατηρείται αλλαγή — αλκένια δεν αντιδρούν με $Br_2$"}, {"id": "B", "text": "Το κόκκινο χρώμα του $Br_2$ εξαφανίζεται — αντίδραση προσθήκης"}, {"id": "C", "text": "Εμφανίζεται λευκό ίζημα"}, {"id": "D", "text": "Ο διπλός δεσμός δεν επηρεάζεται"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$CH_2{=}CH_2 + Br_2 \\rightarrow CH_2BrCH_2Br$. Το $Br_2$ προστίθεται στον διπλό δεσμό → αποχρωματισμός (κόκκινο → άχρωμο). Αυτός είναι ο εργαστηριακός έλεγχος ακορεστότητας.", "common_mistake": "Θεωρείται ότι παράγεται ίζημα — αλλά το $CH_2BrCH_2Br$ είναι υγρό, όχι ίζημα.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_006", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["Markovnikov", "προσθήκη", "HBr", "κύριο-προϊόν"], "learning_objective": "Εφαρμογή κανόνα Markovnikov", "question": "Κατά την προσθήκη $HBr$ στο προπένιο ($CH_3CH{=}CH_2$), το κύριο προϊόν σύμφωνα με τον κανόνα Markovnikov είναι:", "options": [{"id": "A", "text": "$CH_3CH_2CH_2Br$ (1-βρωμοπροπάνιο)"}, {"id": "B", "text": "$CH_3CHBrCH_3$ (2-βρωμοπροπάνιο)"}, {"id": "C", "text": "Ισόποσα και τα δύο"}, {"id": "D", "text": "$CH_2BrCH_2CH_3$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Κανόνας Markovnikov: το $H^+$ προστίθεται στον C με τα περισσότερα H. $CH_3CH{=}CH_2$: ο $CH_2$ (άκρος) έχει 2H, ο $CH$ έχει 1H. Άρα $H^+$ πηγαίνει στον $CH_2$ → $Br^-$ στον $CH$ → κύριο προϊόν: $CH_3CHBrCH_3$.", "common_mistake": "Εφαρμόζεται λανθασμένα ο κανόνας — $H^+$ πηγαίνει στον C με λιγότερα H.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_007", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["προσθήκη", "τριπλός-δεσμός", "διπλάσια-ποσότητα"], "learning_objective": "Γνώση ότι στον τριπλό δεσμό η προσθήκη γίνεται σε δύο βήματα", "question": "Κατά την προσθήκη $HCl$ σε αλκίνιο μέχρι κορεσμού, καταναλώνεται διπλάσια ποσότητα $HCl$ σε σχέση με ισόμοληση ποσότητα αλκενίου.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Στον τριπλό δεσμό η προσθήκη γίνεται σε δύο βήματα: 1ο βήμα: $-C{\\equiv}C- + HCl \\rightarrow -CH{=}CCl-$ (διπλός δεσμός). 2ο βήμα: $-CH{=}CCl- + HCl \\rightarrow -CH_2-CCl_2-$. Άρα 2 mol HCl ανά 1 mol αλκινίου vs 1 mol HCl ανά 1 mol αλκενίου.", "common_mistake": "Θεωρείται ίδια ποσότητα αντιδραστηρίου για αλκένιο και αλκίνιο.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_008", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["απόσπαση", "Saytseff", "κύριο-προϊόν"], "learning_objective": "Εφαρμογή κανόνα Saytseff στις αντιδράσεις απόσπασης", "question": "Κατά την απόσπαση $HBr$ από το 2-βρωμοβουτάνιο ($CH_3CHBrCH_2CH_3$) με αλκοολικό $NaOH$, το κύριο προϊόν σύμφωνα με τον κανόνα Saytseff είναι:", "options": [{"id": "A", "text": "$CH_3CH{=}CHCH_3$ (2-βουτένιο)"}, {"id": "B", "text": "$CH_2{=}CHCH_2CH_3$ (1-βουτένιο)"}, {"id": "C", "text": "Ισόποσα και τα δύο"}, {"id": "D", "text": "$CH_3CBr{=}CHCH_3$"}], "correct_answer": {"type": "option", "value": "A"}, "explanation": "Κανόνας Saytseff: το $H$ αποσπάται ευκολότερα από τον C με λιγότερα H (τριτοταγές > δευτεροταγές > πρωτοταγές). Στο 2-βρωμοβουτάνιο: ο γειτονικός C στο Br από τη μία πλευρά είναι δευτεροταγής ($CH_3CH-$) και από την άλλη πρωτοταγής ($-CH_2CH_3$). Αποσπάται από τον δευτεροταγή → 2-βουτένιο.", "common_mistake": "Εφαρμόζεται Markovnikov αντί Saytseff, ή συγχέεται η αντίδραση απόσπασης με προσθήκη.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_009", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["υποκατάσταση", "RX", "NaOH-υδατικό", "αλκοόλη"], "learning_objective": "Γνώση προϊόντος αντίδρασης RX με υδατικό NaOH", "question": "Κατά την αντίδραση $CH_3CH_2Cl$ με υδατικό διάλυμα $NaOH$, το κύριο οργανικό προϊόν είναι:", "options": [{"id": "A", "text": "$CH_2{=}CH_2$ (αιθένιο) — απόσπαση"}, {"id": "B", "text": "$CH_3CH_2OH$ (αιθανόλη) — υποκατάσταση"}, {"id": "C", "text": "$CH_3CH_2ONa$ (αιθοξείδιο νατρίου)"}, {"id": "D", "text": "$CH_3CHO$ (αιθανάλη)"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Με υδατικό $NaOH$ ευνοείται η υποκατάσταση: $CH_3CH_2Cl + NaOH(aq) \\rightarrow CH_3CH_2OH + NaCl$. Με αλκοολικό $NaOH$ ευνοείται η απόσπαση και σχηματίζεται αλκένιο.", "common_mistake": "Συγχέεται το υδατικό με το αλκοολικό NaOH — ο διαλύτης καθορίζει το κύριο προϊόν. Υδατικό → υποκατάσταση (αλκοόλη). Αλκοολικό → απόσπαση (αλκένιο).", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_010", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["υποκατάσταση", "εστεροποίηση", "υδρόλυση", "ισορροπία"], "learning_objective": "Κατανόηση αμφίδρομης φύσης εστεροποίησης-υδρόλυσης", "question": "Η αντίδραση $RCOOH + R'OH \\rightleftharpoons RCOOR' + H_2O$ είναι:", "options": [{"id": "A", "text": "Μονόδρομη — πάντα προς εστέρα"}, {"id": "B", "text": "Αμφίδρομη — η ευθεία (→) είναι εστεροποίηση, η αντίστροφη (←) υδρόλυση"}, {"id": "C", "text": "Αμφίδρομη — η ευθεία (→) είναι υδρόλυση, η αντίστροφη (←) εστεροποίηση"}, {"id": "D", "text": "Αντίδραση απόσπασης"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Σύμφωνα με το σχολικό βιβλίο: η ευθεία αντίδραση (→) χαρακτηρίζεται υδρόλυση (παράγεται οξύ + αλκοόλη) και η αντίστροφη (←) ονομάζεται εστεροποίηση (παράγεται εστέρας). Η αντίδραση είναι αμφίδρομη — βρίσκεται σε χημική ισορροπία και η κατεύθυνση εξαρτάται από τις συνθήκες.", "common_mistake": "Συγχέεται η κατεύθυνση: στη γραφή RCOOH + R'OH ⇌ RCOOR' + H₂O, η ευθεία (→) είναι η υδρόλυση και η αντίστροφη (←) είναι η εστεροποίηση.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_011", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["υποκατάσταση", "RX", "αλκοολικό-NaOH", "απόσπαση"], "learning_objective": "Διάκριση συνθηκών υποκατάστασης και απόσπασης σε RX", "question": "Κατά την αντίδραση αλκυλαλογονιδίου με αλκοολικό $NaOH$ το κύριο προϊόν είναι αλκένιο (απόσπαση $HX$), ενώ με υδατικό $NaOH$ το κύριο προϊόν είναι αλκοόλη (υποκατάσταση).", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Αλκοολικό $NaOH$: ευνοεί απόσπαση → αλκένιο + $NaX$ + $H_2O$. Υδατικό $NaOH$: ευνοεί υποκατάσταση → αλκοόλη + $NaX$. Ο διαλύτης καθορίζει τον μηχανισμό.", "common_mistake": "Αντιστρέφονται οι συνθήκες: το αλκοολικό NaOH δίνει απόσπαση (αλκένιο), το υδατικό NaOH δίνει υποκατάσταση (αλκοόλη).", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}, {"id": "CH7_012", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["αλογονοφορμική", "ορισμός", "ποιες-ενώσεις"], "learning_objective": "Αναγνώριση ενώσεων που δίνουν αλογονοφορμική αντίδραση", "question": "Ποια από τις παρακάτω ενώσεις ΔΕΝ δίνει αλογονοφορμική αντίδραση;", "options": [{"id": "A", "text": "$CH_3CH_2OH$ (αιθανόλη)"}, {"id": "B", "text": "$CH_3COCH_3$ (ακετόνη)"}, {"id": "C", "text": "$CH_3OH$ (μεθανόλη)"}, {"id": "D", "text": "$CH_3CHOHCH_3$ (2-προπανόλη)"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Αλογονοφορμική δίνουν: αλκοόλες $CH_3-CHOH-R$ ($\\nu \\geq 0$) και κετόνες $CH_3-CO-R$ ($\\nu \\geq 0$). Η μεθανόλη $CH_3OH$ δεν έχει τον τύπο $CH_3-CHOH-R$ (δεν υπάρχει C με H ανάμεσα). Αιθανόλη ✓, ακετόνη ✓ ($CH_3COCH_3$), 2-προπανόλη ✓ ($CH_3CHOHCH_3$).", "common_mistake": "Θεωρείται ότι κάθε αλκοόλη δίνει αλογονοφορμική.", "image_url": null, "source": "Σχολικό βιβλίο, §7.4"}, {"id": "CH7_013", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["αλογονοφορμική", "ιωδοφόρμιο", "CHI3", "χρώμα"], "learning_objective": "Γνώση προϊόντος αλογονοφορμικής με I2/NaOH", "question": "Κατά την αλογονοφορμική αντίδραση με $I_2$ παρουσία $NaOH$, σχηματίζεται:", "options": [{"id": "A", "text": "$CHCl_3$ — άχρωμο υγρό"}, {"id": "B", "text": "$CHBr_3$ — καστανό υγρό"}, {"id": "C", "text": "$CHI_3$ — κίτρινο ίζημα (ιωδοφόρμιο)"}, {"id": "D", "text": "$CI_4$ — άχρωμο αέριο"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Με $I_2 + NaOH$: παράγεται το ιωδοφόρμιο $CHI_3$ — κίτρινο κρυσταλλικό ίζημα με χαρακτηριστική έντονη οσμή. Αυτό χρησιμοποιείται για διάκριση: αν σχηματιστεί κίτρινο ίζημα → η ένωση είναι $CH_3CHOH{-}R$ ή $CH_3CO{-}R$.", "common_mistake": "Συγχέεται το ιωδοφόρμιο με χλωροφόρμιο ή θεωρείται αέριο.", "image_url": null, "source": "Σχολικό βιβλίο, §7.4"}, {"id": "CH7_014", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["αλογονοφορμική", "εξίσωση", "συντελεστές"], "learning_objective": "Γνώση της χημικής εξίσωσης αλογονοφορμικής αντίδρασης", "question": "Η αλογονοφορμική αντίδραση της αιθανόλης με $I_2/NaOH$ δίνει:", "options": [{"id": "A", "text": "$CH_3CH_2OH + I_2 + NaOH \\rightarrow CHI_3 + HCOONa + ...$"}, {"id": "B", "text": "$CH_3CH_2OH + 4I_2 + 6NaOH \\rightarrow CHI_3 + HCOONa + 5NaI + 5H_2O$"}, {"id": "C", "text": "$CH_3CH_2OH + 3I_2 + 3NaOH \\rightarrow CHI_3 + CH_3COONa + ...$"}, {"id": "D", "text": "$CH_3CH_2OH + 4I_2 + 6NaOH \\rightarrow CHI_3 + CH_3COONa + 5NaI + 5H_2O$"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Αιθανόλη: $CH_3CH_2OH$ → τύπος $CH_3CHOH$ με $R=H$. Εφαρμόζω: $CH_3CH_2OH + 4I_2 + 6NaOH \\rightarrow CHI_3 + HCOONa + 5NaI + 5H_2O$. Το καρβοξυλικό που παράγεται είναι $HCOONa$ (μυρμηκικό νάτριο, γιατί $R=H$). Επαλήθευση C: 2→1+1 ✓. Εξισορρόπηση I: 8 ✓.", "common_mistake": "Θεωρείται ότι παράγεται $CH_3COONa$ — αλλά αυτό θα ήταν για 2-προπανόλη ή ακετόνη. Για αιθανόλη ($R=H$) παράγεται $HCOONa$.", "image_url": null, "source": "Σχολικό βιβλίο, §7.4"}, {"id": "CH7_015", "type": "true_false", "difficulty": "hard", "points": 3, "tags": ["αλογονοφορμική", "πρωτοταγείς-αλκοόλες", "αιθανόλη-μόνο"], "learning_objective": "Γνώση ότι από τις πρωτοταγείς αλκοόλες μόνο η αιθανόλη δίνει αλογονοφορμική", "question": "Από τις πρωτοταγείς κορεσμένες μονοσθενείς αλκοόλες, μόνο η αιθανόλη ($CH_3CH_2OH$) δίνει αλογονοφορμική αντίδραση.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Αλογονοφορμική δίνουν πρωτοταγείς αλκοόλες τύπου $CH_3CHOH-R$. Για πρωτοταγείς: αυτός ο τύπος σημαίνει $CH_3CH_2OH$ (αιθανόλη, με $R=H$). Άλλες πρωτοταγείς ($CH_3OH$, $C_2H_5CH_2OH$ κτλ.) δεν έχουν $CH_3$ δίπλα στο $CHOH$. Η μεθανόλη $CH_3OH$ δεν δίνει (δεν έχει τη δομή $CH_3CHOH$).", "common_mistake": "Θεωρείται ότι όλες οι πρωτοταγείς δίνουν αλογονοφορμική.", "image_url": null, "source": "Σχολικό βιβλίο, §7.4"}, {"id": "CH7_016", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["κατηγορίες-αντιδράσεων", "αναγνώριση", "απόσπαση-προσθήκη-υποκατάσταση"], "learning_objective": "Κατηγοριοποίηση οργανικής αντίδρασης", "question": "Ποια κατηγορία αντίδρασης αντιπροσωπεύει η: $CH_3CH_2Br + KOH \\xrightarrow{\\text{αλκοόλη}} CH_2{=}CH_2 + KBr + H_2O$;", "options": [{"id": "A", "text": "Αντίδραση προσθήκης"}, {"id": "B", "text": "Αντίδραση υποκατάστασης"}, {"id": "C", "text": "Αντίδραση απόσπασης"}, {"id": "D", "text": "Αντίδραση πολυμερισμού"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Αποσπάται $HBr$ από το $CH_3CH_2Br$ → σχηματίζεται $CH_2{=}CH_2$ (αλκένιο). Χαρακτηριστικά: ανόργανη ένωση ($HBr$) αποσπάται από οργανική → αντίδραση απόσπασης (αφυδραλογόνωση). Το αλκοολικό $KOH$ ευνοεί απόσπαση.", "common_mistake": "Θεωρείται υποκατάσταση — αλλά εδώ αποσπάται $HBr$ και προκύπτει διπλός δεσμός.", "image_url": null, "source": "Σχολικό βιβλίο, §7.3"}];
const CH8 = [{"id": "CH8_001", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["διαμοριακές-δυνάμεις", "κατηγορίες", "London", "δίπολο"], "learning_objective": "Αναγνώριση κατηγοριών διαμοριακών δυνάμεων", "question": "Ποιες είναι οι τρεις κατηγορίες διαμοριακών δυνάμεων;", "options": [{"id": "A", "text": "Ιοντικές, ομοιοπολικές, μεταλλικές"}, {"id": "B", "text": "Δυνάμεις διπόλου-διπόλου, δυνάμεις London, δεσμός υδρογόνου"}, {"id": "C", "text": "σ δεσμοί, π δεσμοί, δεσμοί υδρογόνου"}, {"id": "D", "text": "Ηλεκτροστατικές, κβαντικές, πυρηνικές"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Οι τρεις κατηγορίες διαμοριακών δυνάμεων είναι: (1) Δυνάμεις διπόλου-διπόλου (μεταξύ πολικών μορίων), (2) Δυνάμεις London ή διασποράς (μεταξύ όλων των μορίων, λόγω στιγμιαίων διπόλων), (3) Δεσμός υδρογόνου (ειδική περίπτωση δυνάμεων διπόλου-διπόλου, σε N-H, O-H, F-H).", "common_mistake": "Συγχέονται οι ενδομοριακοί (χημικοί) δεσμοί με τους διαμοριακούς.", "image_url": null, "source": "Σχολικό βιβλίο, §8.1"}, {"id": "CH8_002", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["δυνάμεις-London", "μη-πολικά", "Mr"], "learning_objective": "Κατανόηση δυνάμεων London και εξάρτησης από Mr", "question": "Οι δυνάμεις London (διασποράς) αναπτύσσονται:", "options": [{"id": "A", "text": "Μόνο μεταξύ πολικών μορίων"}, {"id": "B", "text": "Μόνο σε ενώσεις με δεσμούς N-H, O-H"}, {"id": "C", "text": "Μεταξύ όλων των μορίων (πολικών και μη πολικών) και αυξάνουν με το $M_r$"}, {"id": "D", "text": "Μόνο μεταξύ ιόντων"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Οι δυνάμεις London αναπτύσσονται μεταξύ ΟΛΩΝ των μορίων (λόγω στιγμιαίων διπόλων από τυχαία κατανομή ηλεκτρονίων). Ισχυροποιούνται με αύξηση $M_r$: μεγαλύτερα μόρια → ευκολότερη παραμόρφωση ηλεκτρονιακού νέφους → ισχυρότερα στιγμιαία δίπολα.", "common_mistake": "Θεωρείται ότι London = μόνο μη πολικά — αλλά αναπτύσσονται παντού (σε πολικά συνυπάρχουν με δυνάμεις διπόλου-διπόλου).", "image_url": null, "source": "Σχολικό βιβλίο, §8.1"}, {"id": "CH8_003", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["δεσμός-υδρογόνου", "ορισμός", "N-H-O-H-F-H"], "learning_objective": "Αναγνώριση ενώσεων που σχηματίζουν δεσμό υδρογόνου", "question": "Ποια από τις παρακάτω ενώσεις ΔΕΝ σχηματίζει δεσμό υδρογόνου μεταξύ των μορίων της;", "options": [{"id": "A", "text": "$H_2O$"}, {"id": "B", "text": "$NH_3$"}, {"id": "C", "text": "$CH_4$"}, {"id": "D", "text": "$HF$"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Δεσμός υδρογόνου αναπτύσσεται σε ενώσεις με δεσμούς N-H, O-H, F-H (ηλεκτραρνητικά στοιχεία μικρού μεγέθους). $H_2O$ (O-H) ✓, $NH_3$ (N-H) ✓, $HF$ (F-H) ✓. Το $CH_4$ έχει C-H — το C δεν είναι αρκετά ηλεκτραρνητικό → δεν σχηματίζει δεσμό Η.", "common_mistake": "Θεωρείται ότι το $CH_4$ σχηματίζει δεσμό Η επειδή έχει H.", "image_url": null, "source": "Σχολικό βιβλίο, §8.1"}, {"id": "CH8_004", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["δεσμός-υδρογόνου", "σημείο-βρασμού", "νερό", "H2S"], "learning_objective": "Κατανόηση επίδρασης δεσμού υδρογόνου στο σημείο βρασμού", "question": "Το $H_2O$ έχει υψηλότερο σημείο βρασμού από το $H_2S$ παρά το μικρότερο $M_r$ του, λόγω των δεσμών υδρογόνου μεταξύ των μορίων $H_2O$.", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Αν κυριαρχούσαν δυνάμεις London, το $H_2S$ ($M_r=34$) θα έβραζε σε υψηλότερη θερμοκρασία από το $H_2O$ ($M_r=18$). Αλλά το $H_2O$ έχει O-H → δεσμοί Η → πολύ ισχυρότερες διαμοριακές δυνάμεις → Σ.Β. $H_2O$: 373 K, Σ.Β. $H_2S$: 212 K.", "common_mistake": "Θεωρείται ότι μεγαλύτερο $M_r$ = πάντα υψηλότερο Σ.Β. — αλλά ο δεσμός Η υπερκαλύπτει αυτή την τάση.", "image_url": null, "source": "Σχολικό βιβλίο, §8.1"}, {"id": "CH8_005", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ισχύς-δεσμών", "σύγκριση", "διαμοριακοί-χημικοί"], "learning_objective": "Σύγκριση ισχύος διαμοριακών και χημικών δεσμών", "question": "Σε αύξουσα σειρά ισχύος, η σωστή κατάταξη είναι:", "options": [{"id": "A", "text": "Δεσμός υδρογόνου < δυνάμεις London < ιοντικός δεσμός"}, {"id": "B", "text": "Ιοντικός δεσμός < δεσμός υδρογόνου < δυνάμεις London"}, {"id": "C", "text": "Δυνάμεις London < δεσμός υδρογόνου < ιοντικός δεσμός"}, {"id": "D", "text": "Δυνάμεις London = δεσμός υδρογόνου < ιοντικός δεσμός"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Σε αύξουσα σειρά ισχύος: δυνάμεις London (ασθενέστερες διαμοριακές) < δεσμός υδρογόνου (ισχυρότερες διαμοριακές) < χημικοί δεσμοί (ιοντικός, ομοιοπολικός). Οι χημικοί δεσμοί είναι πολύ ισχυρότεροι από οποιαδήποτε διαμοριακή δύναμη.", "common_mistake": "Συγχέεται η σειρά — θεωρείται ότι ο δεσμός Η είναι ισχυρότερος από χημικό δεσμό.", "image_url": null, "source": "Σχολικό βιβλίο, §8.1"}, {"id": "CH8_006", "type": "single_choice", "difficulty": "easy", "points": 1, "tags": ["προσθετικές-ιδιότητες", "ορισμός", "φύση-ουσίας"], "learning_objective": "Κατανόηση ορισμού προσθετικών ιδιοτήτων", "question": "Προσθετικές ιδιότητες διαλυμάτων είναι ιδιότητες που:", "options": [{"id": "A", "text": "Εξαρτώνται από τη χημική φύση της διαλυμένης ουσίας"}, {"id": "B", "text": "Εξαρτώνται μόνο από τον αριθμό σωματιδίων (mol) της διαλυμένης ουσίας, ανεξάρτητα από τη φύση της"}, {"id": "C", "text": "Εξαρτώνται μόνο από τη θερμοκρασία"}, {"id": "D", "text": "Εξαρτώνται από το μοριακό βάρος της διαλυμένης ουσίας"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Προσθετικές ιδιότητες: εξαρτώνται από την ποσότητα (mol) διαλυμένης ουσίας ανά όγκο διαλύματος — ΟΧΙ από τη χημική φύση της. Παραδείγματα: ωσμωτική πίεση, ανύψωση Σ.Β., ταπείνωση Σ.Π.", "common_mistake": "Θεωρείται ότι η φύση της ουσίας επηρεάζει τις προσθετικές ιδιότητες.", "image_url": null, "source": "Σχολικό βιβλίο, §8.2"}, {"id": "CH8_007", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ώσμωση", "ορισμός", "κατεύθυνση", "ημιπερατή-μεμβράνη"], "learning_objective": "Κατανόηση φαινομένου ώσμωσης και κατεύθυνσης ροής", "question": "Κατά την ώσμωση, τα μόρια του διαλύτη (νερού) περνούν μέσω ημιπερατής μεμβράνης:", "options": [{"id": "A", "text": "Από το υπερτονικό διάλυμα προς το υποτονικό"}, {"id": "B", "text": "Από το υποτονικό (αραιότερο) προς το υπερτονικό (πυκνότερο) διάλυμα"}, {"id": "C", "text": "Και προς τις δύο κατευθύνσεις με ίσες ταχύτητες"}, {"id": "D", "text": "Από το διάλυμα προς τον καθαρό διαλύτη"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "Ώσμωση: διάχυση μορίων διαλύτη από το διάλυμα μικρότερης συγκέντρωσης (υποτονικό, μικρότερη $\\Pi$) προς το διάλυμα μεγαλύτερης συγκέντρωσης (υπερτονικό, μεγαλύτερη $\\Pi$), μέσω ημιπερατής μεμβράνης.", "common_mistake": "Αντιστρέφεται η κατεύθυνση — θεωρείται ότι ο διαλύτης πηγαίνει από πυκνό προς αραιό.", "image_url": null, "source": "Σχολικό βιβλίο, §8.2"}, {"id": "CH8_008", "type": "single_choice", "difficulty": "medium", "points": 2, "tags": ["ωσμωτική-πίεση", "τύπος", "υπολογισμός"], "learning_objective": "Υπολογισμός ωσμωτικής πίεσης", "question": "Διάλυμα γλυκόζης ($M_r = 180$ g/mol) συγκέντρωσης $0{,}1$ M στους $27°C$ ($T = 300$ K). Η ωσμωτική πίεση ($R = 0{,}082$ L·atm/mol·K) είναι:", "options": [{"id": "A", "text": "$\\Pi = 0{,}82$ atm"}, {"id": "B", "text": "$\\Pi = 2{,}46$ atm"}, {"id": "C", "text": "$\\Pi = 8{,}2$ atm"}, {"id": "D", "text": "$\\Pi = 0{,}082$ atm"}], "correct_answer": {"type": "option", "value": "B"}, "explanation": "$\\Pi = cRT = 0{,}1 \\times 0{,}082 \\times 300 = 2{,}46$ atm. Η γλυκόζη είναι μη ηλεκτρολύτης → $c = 0{,}1$ M (δεν ιοντίζεται). Επαλήθευση μονάδων: (mol/L)(L·atm/mol·K)(K) = atm ✓.", "common_mistake": "Χρησιμοποιείται $T = 27°C$ αντί $T = 300$ K — η θερμοκρασία πρέπει να είναι σε Kelvin.", "image_url": null, "source": "Σχολικό βιβλίο, §8.2"}, {"id": "CH8_009", "type": "true_false", "difficulty": "medium", "points": 2, "tags": ["ισοτονικά", "φυσιολογικός-ορός", "αίμα"], "learning_objective": "Γνώση ισοτονικότητας φυσιολογικού ορού με αίμα", "question": "Ο φυσιολογικός ορός ($0{,}9\\%$ w/w $NaCl$) και το διάλυμα γλυκόζης $5{,}7\\%$ w/w είναι ισοτονικά με το αίμα ($\\Pi \\approx 7{,}7$ atm).", "correct_answer": {"type": "boolean", "value": true}, "explanation": "Ισοτονικά διαλύματα έχουν ίδια ωσμωτική πίεση. Φυσιολογικός ορός ($0{,}9\\%$ w/w NaCl) και γλυκόζη $5{,}7\\%$ w/w έχουν $\\Pi \\approx 7{,}7$ atm, ίδια με αυτή του αίματος. Γι' αυτό χρησιμοποιούνται σε ενδοφλέβιες χορηγήσεις — δεν προκαλούν ώσμωση στα ερυθρά αιμοσφαίρια.", "common_mistake": "Θεωρείται ότι μόνο ο φυσιολογικός ορός είναι ισοτονικός — αλλά και η γλυκόζη $5{,}7\\%$ είναι ισοτονική.", "image_url": null, "source": "Σχολικό βιβλίο, §8.2"}, {"id": "CH8_010", "type": "single_choice", "difficulty": "hard", "points": 3, "tags": ["ωσμωτική-πίεση", "σύγκριση", "ισοτονικό-υπερτονικό"], "learning_objective": "Σύγκριση ωσμωτικών πιέσεων και πρόβλεψη κατεύθυνσης ώσμωσης", "question": "Κύτταρο αίματος ($\\Pi_{\\text{αίμα}} = 7{,}7$ atm) τοποθετείται σε διάλυμα $NaCl$ $2\\%$ w/w. Αν $\\Pi_{\\text{διαλ}} > 7{,}7$ atm, τι θα συμβεί;", "options": [{"id": "A", "text": "Το κύτταρο θα διογκωθεί — νερό εισέρχεται"}, {"id": "B", "text": "Τίποτα — ισοτονικό διάλυμα"}, {"id": "C", "text": "Το κύτταρο θα συρρικνωθεί (πλασμόλυση) — νερό εξέρχεται"}, {"id": "D", "text": "Το κύτταρο θα διαλυθεί"}], "correct_answer": {"type": "option", "value": "C"}, "explanation": "Το διάλυμα NaCl $2\\%$ είναι υπερτονικό ($\\Pi > 7{,}7$ atm). Ώσμωση: νερό ρέει από το κύτταρο (υποτονικό σε σχέση με το διάλυμα) προς το διάλυμα → το κύτταρο χάνει νερό → συρρικνώνεται (πλασμόλυση). Αν $\\Pi_{\\text{διαλ}} < 7{,}7$ atm (υποτονικό): νερό εισέρχεται → διόγκωση/λύση.", "common_mistake": "Αντιστρέφεται: θεωρείται ότι υπερτονικό διάλυμα → διόγκωση κυττάρου.", "image_url": null, "source": "Σχολικό βιβλίο, §8.2"}];

  {id:"ch4",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 4 \u00b7 \u03a7\u03b7\u03bc\u03b9\u03ba\u03ae \u0399\u03c3\u03bf\u03c1\u03c1\u03bf\u03c0\u03af\u03b1",section:"\u00a74.1-4.3",questions:CH4},
  {id:"ch5_1_2",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 5 \u00b7 \u039f\u03be\u03ad\u03b1 - \u0392\u03ac\u03c3\u03b5\u03b9\u03c2 - \u0399\u03bf\u03bd\u03c4\u03b9\u03c3\u03bc\u03cc\u03c2",section:"\u00a75.1-5.2",questions:CH5_1_2},
  {id:"ch5_3",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 5 \u00b7 Ka, Kb - \u0392\u03b1\u03b8\u03bc\u03cc\u03c2 \u0399\u03bf\u03bd\u03c4\u03b9\u03c3\u03bc\u03bf\u03cd - pH",section:"\u00a75.3",questions:CH5_3},
  {id:"ch5_4",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 5 \u00b7 \u0395\u03c0\u03af\u03b4\u03c1\u03b1\u03c3\u03b7 \u039a\u03bf\u03b9\u03bd\u03bf\u03cd \u0399\u03cc\u03bd\u03c4\u03bf\u03c2",section:"\u00a75.4",questions:CH5_4},
  {id:"ch5_5",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 5 \u00b7 \u03a1\u03c5\u03b8\u03bc\u03b9\u03c3\u03c4\u03b9\u03ba\u03ac \u0394\u03b9\u03b1\u03bb\u03cd\u03bc\u03b1\u03c4\u03b1",section:"\u00a75.5",questions:CH5_5},
  {id:"ch5_6",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 5 \u00b7 \u0394\u03b5\u03af\u03ba\u03c4\u03b5\u03c2 - \u039f\u03b3\u03ba\u03bf\u03bc\u03ad\u03c4\u03c1\u03b7\u03c3\u03b7",section:"\u00a75.6",questions:CH5_6},
  {id:"ch6",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 6 \u00b7 \u0397\u03bb\u03b5\u03ba\u03c4\u03c1\u03bf\u03bd\u03b9\u03b1\u03ba\u03ae \u0394\u03bf\u03bc\u03ae & \u03a0\u03b5\u03c1\u03b9\u03bf\u03b4\u03b9\u03ba\u03cc\u03c2 \u03a0\u03af\u03bd\u03b1\u03ba\u03b1\u03c2",section:"\u00a76.1-6.4",questions:CH6},
  {id:"ch7",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 7 \u00b7 \u039f\u03c1\u03b3\u03b1\u03bd\u03b9\u03ba\u03ae \u03a7\u03b7\u03bc\u03b5\u03af\u03b1",section:"\u00a77.1, 7.3, 7.4",questions:CH7},
  {id:"ch8",title:"\u039a\u03b5\u03c6\u03ac\u03bb\u03b1\u03b9\u03bf 8 \u00b7 \u0394\u03b9\u03b1\u03bc\u03bf\u03c1\u03b9\u03b1\u03ba\u03ad\u03c2 \u0394\u03c5\u03bd\u03ac\u03bc\u03b5\u03b9\u03c2 - \u038f\u03c3\u03bc\u03c9\u03c3\u03b7",section:"\u00a78.1, 8.2",questions:CH8}
];
const ALL_QUESTIONS = CHAPTERS.reduce((a,c)=>a.concat(c.questions),[]);
</script>
<script>
let activeQuestions=[],current=0,answered=false,shuffleOn=false,filterMode=0;
let sessionLog=[],sessionStart=null,timerInterval=null,elapsed=0,activeChapterIdx=-1;
const filterLabels=['Όλες','Εύκολες','Μέτριες','Δύσκολες'];
const filterDiffs=[null,'easy','medium','hard'];

function getCorrectValue(q){
  const ca=q.correct_answer;
  if(ca&&typeof ca==='object'&&'value' in ca)return ca.value;
  return ca;
}

function renderChapterSelect(){
  const sel=document.getElementById('chapterSelect');
  const totalQ=ALL_QUESTIONS.length;
  let html=`<div class="chapter-group"><h2>// Επιλογή κεφαλαίου</h2><div class="chapter-grid">
    <button class="ch-btn all-btn" onclick="startQuiz(-1)">
      <div class="ch-title">⚗️ Όλα τα κεφάλαια</div>
      <div class="ch-count">${totalQ} ερωτήσεις συνολικά</div>
    </button></div></div>
  <div class="chapter-group"><h2>// Χημεία Γ' Λυκείου</h2><div class="chapter-grid">`;
  CHAPTERS.forEach((ch,idx)=>{
    const parts=ch.title.split(' · ');
    html+=`<button class="ch-btn" onclick="startQuiz(${idx})">
      <div class="ch-title">${esc(parts[0])}</div>
      <div class="ch-sub">${esc(parts[1]||'')}</div>
      <div class="ch-count">${ch.questions.length} ερωτήσεις · ${esc(ch.section||'')}</div>
    </button>`;
  });
  html+=`</div></div>`;
  sel.innerHTML=html;
}

function startQuiz(idx){
  activeChapterIdx=idx;
  document.getElementById('chapterSelect').style.display='none';
  document.getElementById('quizArea').style.display='block';
  const ch=idx===-1?{title:'Όλα τα κεφάλαια'}:CHAPTERS[idx];
  document.getElementById('subtitle').textContent=ch.title;
  resetSession();
}

function buildQuestionList(){
  let pool=activeChapterIdx===-1?[...ALL_QUESTIONS]:[...CHAPTERS[activeChapterIdx].questions];
  const diff=filterDiffs[filterMode];
  if(diff)pool=pool.filter(q=>q.difficulty===diff);
  if(shuffleOn)pool=shuffle(pool);
  return pool;
}

function resetSession(){
  activeQuestions=buildQuestionList();
  current=0;sessionLog=[];elapsed=0;
  sessionStart=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  renderQuestion();updateProgress();
}

function backToChapters(){
  clearInterval(timerInterval);
  document.getElementById('quizArea').style.display='none';
  document.getElementById('chapterSelect').style.display='flex';
  document.getElementById('questionArea').innerHTML='';
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function updateTimer(){
  elapsed=Math.floor((Date.now()-sessionStart)/1000);
  const m=Math.floor(elapsed/60),s=(elapsed%60).toString().padStart(2,'0');
  document.getElementById('statTime').textContent=m+':'+s;
}

function updateProgress(){
  const total=activeQuestions.length,done=sessionLog.length;
  const pct=total?(done/total*100):0;
  const correct=sessionLog.filter(x=>x.correct===true).length;
  const wrong=sessionLog.filter(x=>x.correct===false).length;
  document.getElementById('progressCounter').textContent=done+' / '+total;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
}

function renderQuestion(){
  const area=document.getElementById('questionArea');
  if(current>=activeQuestions.length){renderResults();return;}
  answered=false;
  const q=activeQuestions[current];
  const correctVal=getCorrectValue(q);
  const diffMap={easy:'badge-easy',medium:'badge-medium',hard:'badge-hard'};
  const diffLbl={easy:'Εύκολο',medium:'Μέτριο',hard:'Δύσκολο'};
  const typeLbl={single_choice:'Πολλαπλής επιλογής',true_false:'Σωστό/Λάθος',fill_blank:'Συμπλήρωση'};

  let bodyHTML='';
  if(q.type==='true_false'){
    bodyHTML=`<div style="display:flex;gap:12px">
      <button class="option-btn" id="tf-true" onclick="answerTF(true)" style="flex:1;justify-content:center;flex-direction:column;align-items:center;gap:6px;padding:20px">
        <span style="font-size:28px">✓</span><span>ΣΩΣΤΟ</span>
      </button>
      <button class="option-btn" id="tf-false" onclick="answerTF(false)" style="flex:1;justify-content:center;flex-direction:column;align-items:center;gap:6px;padding:20px">
        <span style="font-size:28px">✗</span><span>ΛΑΘΟΣ</span>
      </button>
    </div>`;
  } else {
    bodyHTML=`<div class="options-list">`+
      (q.options||[]).map(opt=>`
        <button class="option-btn" id="opt-${opt.id}" onclick="answerMC('${opt.id}')">
          <span class="option-letter">${opt.id}</span>
          <span>${opt.text}</span>
        </button>`).join('')+
      `</div>`;
  }

  area.innerHTML=`<div class="q-card">
    <div class="q-meta">
      <span class="badge ${diffMap[q.difficulty]||'badge-medium'}">${diffLbl[q.difficulty]||q.difficulty}</span>
      <span class="badge badge-type">${typeLbl[q.type]||q.type}</span>
      <span class="badge badge-pts">${q.points||1} ${q.points===1?'μόριο':'μόρια'}</span>
    </div>
    <div class="q-number">Ερώτηση ${current+1} από ${activeQuestions.length}</div>
    <div class="q-text">${q.question}</div>
    ${bodyHTML}
    <div id="explanation" style="display:none"></div>
    <div class="q-actions">
      <button class="btn btn-ghost" onclick="skipQuestion()">Παράλειψη</button>
      <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" disabled>Επόμενη →</button>
    </div>
  </div>`;

  // Render LaTeX
  if(window.MathJax) MathJax.typesetPromise([area]).catch(()=>{});
}

function esc(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function answerTF(val){
  if(answered)return;answered=true;
  const q=activeQuestions[current];
  const correctVal=getCorrectValue(q);
  const correct=val===correctVal;
  sessionLog.push({correct});
  const tb=document.getElementById('tf-true');
  const fb=document.getElementById('tf-false');
  tb.disabled=fb.disabled=true;
  if(val===true) tb.classList.add(correct?'correct':'wrong');
  else fb.classList.add(correct?'correct':'wrong');
  if(!correct){document.getElementById(correctVal?'tf-true':'tf-false').classList.add('correct');}
  showExp(q.explanation,correct);
  document.getElementById('btnNext').disabled=false;
  updateProgress();
}

function answerMC(optId){
  if(answered)return;answered=true;
  const q=activeQuestions[current];
  const correctVal=getCorrectValue(q);
  const correct=optId===correctVal;
  sessionLog.push({correct});
  (q.options||[]).forEach(opt=>{
    const btn=document.getElementById('opt-'+opt.id);
    if(!btn)return;btn.disabled=true;
    if(opt.id===optId)btn.classList.add(correct?'correct':'wrong');
    if(opt.id===correctVal&&!correct)btn.classList.add('correct');
  });
  showExp(q.explanation,correct);
  document.getElementById('btnNext').disabled=false;
  updateProgress();
}

function showExp(text,correct){
  if(!text)return;
  const el=document.getElementById('explanation');
  const color=correct?'var(--green)':'var(--red)';
  const label=correct?'✓ Σωστά!':'✗ Λάθος!';
  el.style.display='block';
  el.innerHTML=`<strong style="color:${color}">${label}</strong><br><br>${text}`;
  if(window.MathJax)MathJax.typesetPromise([el]).catch(()=>{});
}

function nextQuestion(){current++;current>=activeQuestions.length?renderResults():renderQuestion();}

function skipQuestion(){
  if(!answered){sessionLog.push({correct:null,skipped:true});updateProgress();}
  current++;current>=activeQuestions.length?renderResults():renderQuestion();
}

function renderResults(){
  clearInterval(timerInterval);
  const scored=sessionLog.filter(x=>x.correct!==null&&!x.skipped);
  const correct=scored.filter(x=>x.correct===true).length;
  const wrong=scored.filter(x=>x.correct===false).length;
  const pct=scored.length?Math.round(correct/scored.length*100):0;
  const m=Math.floor(elapsed/60),s=(elapsed%60).toString().padStart(2,'0');
  let gc,gl;
  if(pct>=75){gc='grade-A';gl='Άριστα 🏆';}
  else if(pct>=50){gc='grade-B';gl='Καλά 👍';}
  else{gc='grade-C';gl='Χρειάζεσαι επανάληψη 📚';}
  document.getElementById('questionArea').innerHTML=`
    <div class="results-card">
      <div class="results-label">Αποτέλεσμα Συνεδρίας</div>
      <div class="results-score">${pct}%</div>
      <div class="results-grade ${gc}">${gl}</div>
      <div class="results-grid">
        <div class="res-stat c"><div class="res-stat-val">${correct}</div><div class="res-stat-lbl">Σωστές</div></div>
        <div class="res-stat w"><div class="res-stat-val">${wrong}</div><div class="res-stat-lbl">Λάθος</div></div>
        <div class="res-stat t"><div class="res-stat-val">${m}:${s}</div><div class="res-stat-lbl">Χρόνος</div></div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="resetSession()">↺ Νέα Προσπάθεια</button>
      <button class="back-btn" onclick="backToChapters()">← Επιλογή κεφαλαίου</button>
    </div>`;
}

function toggleShuffle(){
  shuffleOn=!shuffleOn;
  document.getElementById('btnShuffle').classList.toggle('active',shuffleOn);
  showToast(shuffleOn?'🔀 Τυχαία σειρά ενεργή':'📋 Κανονική σειρά');
  resetSession();
}

function cycleFilter(){
  filterMode=(filterMode+1)%4;
  document.getElementById('filterLabel').textContent=filterLabels[filterMode];
  document.getElementById('btnFilter').classList.toggle('active',filterMode!==0);
  resetSession();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderChapterSelect();
</script>
</body>
</html>
